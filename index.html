  hawaii: {
    title:'Big Island, Hawaii', center:[19.6,-155.5], zoom:10, total:55,
    stripeUrl:'https://buy.stripe.com/7sY00jgW6a9l4R6dtJenS02?success_url=https%3A%2F%2Fmaxdinamyte.com%2Fhawaii-success.html%3Ftoken%3Dmdt2026hawaii',
    places:[
      {name:'Papakōlea Green Sand Beach',type:'site',lat:18.9361452,lng:-155.6465034,free:true,desc:'One of the more remarkable beaches in the world. The sand here is olivine (aka peridot), giving it a genuinely green color. Getting there requires a hike as there is no paved road access to the beach. Do not take the sand. It is protected and removal is a federal offense.'},
      {name:'Punaluʻu Beach (Black Sand Beach)',type:'site',lat:19.1357578,lng:-155.5047867,free:true,desc:'A beautiful and easily accessible beach with striking black sand made from fine lava rock. It is not unusual to see sea turtles resting on the warm sand here. It is a genuinely special thing to witness. Do not approach, touch, or disturb any turtles you see. They are federally protected and harassment carries real legal penalties.'},
      {name:'Kīlauea Visitor Center',type:'site',lat:19.4296642,lng:-155.2571648,free:false,desc:'The visitor center for Kilauea, one of the most active volcanoes in the world. On a good day you can see fountaining and lava moving toward the ocean. It is an extraordinary thing to witness. Always check the National Park Service website before you go for current activity levels, air quality advisories, and access restrictions, as conditions can change quickly and some areas of the park may be closed or hazardous depending on the day'},
      {name:'Maunakea Visitor Information Station',type:'site',lat:19.7592729,lng:-155.4561238,free:false,desc:'Mauna Kea is a technically active volcano, though dormant in human terms, and at nearly 14,000 feet it is the tallest point in the Pacific. The observatory at the summit sits above the clouds and offers some of the best stargazing on earth. Getting to the top involves a rugged, high-altitude road. We\'d strongly recommend booking a licensed guided tour rather than driving it independently, and checking with the Mauna Kea Visitor Information Station and the University of Hawaii for current access conditions before going. The Visitor Information Station itself is at 9,000 feet on a paved road, is sometimes above the clouds, and can offer fantastic stargazing with considerably less risk.'},
      {name:'Manta Rays',type:'site',lat:19.5610978,lng:-155.964717,free:false,desc:'Years ago, the hotels around this bay set up lights looking into the water, which drew plankton, which drew manta rays. Now they come into the bay almost every night, and swimming alongside them on a guided tour is one of the more extraordinary things you can do on the Big Island. Book through one of the tour operators licensed by the Hawaii Division of Aquatic Resources. They\'ll walk you through the safety procedures and the rules around the animals. Look for operators with strong safety records and solid reviews before booking.'},
      {name:'Rainbow Falls',type:'site',lat:19.7192836,lng:-155.109422,free:false,desc:'This is a double barreled waterfall that is easy to get to. It\'s special because of the rainbow formed by the water spilling over the edge of the cliff.'},
      {name:'Hiilawe Falls',type:'site',lat:20.0977778,lng:-155.5991667,free:false,desc:'This is a breathtaking waterfall that is 1,400 feet tall. Getting there is not easy. It involves either a serious hike or a four-wheel drive descent into Waipiʻo Valley on a steep, unpaved road. We\'d strongly suggest going with a licensed local operator rather than attempting the drive independently. Also worth checking whether water is flowing before you make the trip, as it can dry up between rains. You should verify conditions with local operators or the Hawaii Division of Forestry and Wildlife before going.'},
      {name:'‘Akaka Falls',type:'site',lat:19.8533838,lng:-155.1562264,free:false,desc:'This is a beautiful waterfall that is easily accessible through the state park. It\'s about a 30 minute walk on a paved trail through rainforest.'},
      {name:'JoesNuts Macadamia Farm',type:'site',lat:19.43791,lng:-155.8886413,free:false,desc:'This is a macadamia nut farm where you can do tours and then eat delicious macadamia nuts.'},
      {name:'Umauma Falls',type:'site',lat:19.9050894,lng:-155.141825,free:false,desc:'A gorgeous tiered waterfall worth the detour. Access is through a private nature park that charges an entry fee for a self-guided tour. You cannot simply walk up to it on your own, as the surrounding land is private property. Book through the official operator before visiting.'},
      {name:'Hawaiʻi Volcanoes National Park',type:'site',lat:19.4963669,lng:-155.4661859,free:false,desc:'Far more than just Kilauea, this park is a landscape unlike anything else in the United States, and possibly the world. Before you go, check the National Park Service website for what\'s currently open and what isn\'t. Volcanic activity can shift quickly, and the NPS will have the most up-to-date guidance on what\'s accessible and what areas to avoid.'},
      {name:'Pololū Valley Lookout',type:'site',lat:20.2035807,lng:-155.7338497,free:false,desc:'One of the most stunning views on the island. The cliffs here look like something out of a movie. There is a trailhead at the top, but it is a serious and physically demanding hike, not a casual walk. You need to check in before attempting it, and we\'d strongly recommend consulting the Hawaii Division of Forestry and Wildlife on current trail conditions before you go.'},
      {name:'Hōlei Sea Arch',type:'site',lat:19.294522,lng:-155.0979354,free:false,desc:'At the end of Chain of Craters road is a parking lot. From that parking lot is a paved trail. About a quarter mile down that trail is a beautiful view of the cliffs and the Holei Sea Arch, which is a natural arch in the cliff.'},
      {name:'Pu‘uloa Petroglyphs',type:'site',lat:19.2927086,lng:-155.1220451,free:false,desc:'The Big Island has many points where you can see petroglyphs created by ancient Hawaiians. This is one of the best places to see them as it is a large field of petroglyphs and it\'s a relatively easy hike of about 1.25 miles.'},
      {name:'Kaloko-Honokōhau National Historical Park',type:'site',lat:19.6778522,lng:-156.0216868,free:false,desc:'This is a national park where petroglyphs are visible from a boardwalk trail. It is worth a stop if you have a bit of time as they have also recreated some houses and a temple. It is free.'},
      {name:'Banyans Beach',type:'site',lat:19.6065748,lng:-155.9767514,free:false,desc:'One of the best places on the island to watch serious surfers do their thing. The waves here are truly awe-inspiring. This is a genuine big-wave surf location with large reef breaks, so if you\'re thinking about getting in the water, assess conditions carefully and independently before doing so.'},
      {name:'Hapuna Beach State Recreation Area',type:'site',lat:19.9913889,lng:-155.825,free:false,desc:'One of the best spots to view the famous Hawaiian sunsets. It\'s got white sands and beautiful blue water. It can get crowded at sunset, so make sure you plan accordingly.'},
      {name:'Kaunaʻoa (Mauna Kea) Beach',type:'site',lat:20.0046492,lng:-155.8245743,free:false,desc:'A white sand beach that affords fantastic sunsets. One of the great things about this beach is that you can rent a cabana for the day.'},
      {name:'Carlsmith Beach Park',type:'site',lat:19.7336174,lng:-155.0277389,free:false,desc:'A beautiful snorkeling spot with clear water and abundant marine life. Sea turtles are sometimes present. It is a genuinely extraordinary thing to see. If you see a turtle , keep your distance and do not touch or approach them. They are federally protected under the Endangered Species Act and the Marine Turtle Protection Act, and interfering with them carries real legal consequences.'},
      {name:'Parker Ranch',type:'site',lat:20.0198559,lng:-155.6820739,free:false,desc:'Ranches are not just a Texas thing. Parker Ranch is the oldest and largest working ranch on the Big Island. You can book self-guided tours of the facilities, and on July 4th weekend there is a rodeo and horse racing. It\'s truly odd to think about a cattle ranch on an island, but this is a BIG island.'},
      {name:'Greenwell Farms',type:'site',lat:19.511024,lng:-155.9204432,free:false,desc:'This is the oldest operating coffee plantation on the Big Island, making it the oldest in the United States. You can do tours and tasting everyday.'},
      {name:'Poke Market',type:'restaurant',lat:19.7261819,lng:-155.0873508,free:true,desc:'This is widely considered the best poke on the island if not in the islands.'},
      {name:'Honaunau Poke Shop',type:'restaurant',lat:19.4464308,lng:-155.8796838,free:true,desc:'Another poke shop. Try the garlic scallops and/or the ho\'io.'},
      {name:'Kawaihae Marketplace',type:'restaurant',lat:20.0386132,lng:-155.8296004,free:false,desc:'More poke. Try the wasabi pistachio ahi.'},
      {name:'Da Poke Shack',type:'restaurant',lat:19.6079178,lng:-155.9771731,free:false,desc:'This is a very popular poke shop that often has lines out the door. It\'s known for being some of the freshest poke on the Big Island.'},
      {name:'Hale I\'a Da Fish House',type:'restaurant',lat:20.0389111,lng:-155.8298404,free:false,desc:'This is not just poke, although they do have that and it is considered some of the best. It has all types of fish platters. The mahi mahi and marlin are particularly popular.'},
      {name:'Original Big Island Shave Ice Co.',type:'restaurant',lat:19.9161665,lng:-155.8819303,free:false,desc:'Hawaii is famous for it\'s shaved ice, and this is one of the best shaved ice shops on the Big Island. Get the Noelani, you won\'t be disappointed.'},
      {name:'GJ\'s Huli Chicken',type:'restaurant',lat:20.0260975,lng:-155.657537,free:false,desc:'Huli huli chicken is sweet and savory BBQ chicken. GJ\'s is probably the best on the the Big Island, and is reasonably priced.'},
      {name:'Suisan Fish Market',type:'restaurant',lat:19.723899,lng:-155.0701638,free:false,desc:'This poke shop is often recommended by locals. It is in an actual fish market, so it is certainly more industrial.'},
      {name:'Hilo Farmer\'s Market',type:'restaurant',lat:19.7229776,lng:-155.084795,free:false,desc:'Normally, when traveling, farmer\'s markets are difficult. You rarely have the facilities to use what you can buy, but this is different. This is a prime location to find a Kona Sugarloaf pineapple, which is a delicious, sweet, low-acid, white pineapple that doesn\'t travel well. They\'re in season from late spring through summer. Only open on Wednesday and Saturday. Also, try the Kula Shave Ice, which is open all week not just on market days.'},
      {name:'Kaaloa\'s Super J\'s',type:'restaurant',lat:19.4536491,lng:-155.8799224,free:false,desc:'This is a very local and casual place. It is also where to go for lau lau, which is butterfish and pork wrapped in taro leaves and is a Hawaiian staple. They also do very good kalua pig.'},
      {name:'Cafe 100 Inc',type:'restaurant',lat:19.7144284,lng:-155.0771913,free:false,desc:'This is an old school drive in, and is well known for it\'s loco moco, which is a Hawaiian food that involves, rice, gravy, hamburgers and fried eggs.'},
      {name:'Menehune Coffee Company',type:'restaurant',lat:19.441298,lng:-155.880016,free:false,desc:'This is a very local coffee shop that does breakfast and lunch. The pancakes with haupia sauce are definitely the star of the show. The coffee is 100% Kona.'},
      {name:'Kona Farmers Market',type:'restaurant',lat:19.6370647,lng:-155.9918398,free:false,desc:'Like with the Hilo Farmer\'s Market, you are here looking for a Kona Sugarloaf. It\'s the largest in the Kona area. Open Wednesday through Sunday from 7am to 4pm.'},
      {name:'Ken\'s House of Pancakes',type:'restaurant',lat:19.7223069,lng:-155.0646887,free:false,desc:'This is an old school dinner and where to go for macadamia nut pancakes/waffles with coconut syrup. They\'re fantastic.'},
      {name:'Randy\'s Huli Chicken and Ribs',type:'restaurant',lat:19.5230713,lng:-155.9216662,free:false,desc:'In the conversation with GJ\'s for the best huli huli chicken on the island.'},
      {name:'Tex Drive-In',type:'restaurant',lat:20.0718618,lng:-155.46448,free:false,desc:'This is quintessential Hawaiian platters. The food is fantastic, and most importantly, try the malasadas, which are like a Portuguese donut.'},
      {name:'Punalu\'u Bake Shop',type:'restaurant',lat:19.0612549,lng:-155.5859636,free:false,desc:'This is the southernmost bakery in the United States and is famous for Hawaiian sweet bread. They have sandwiches, burgers, soups, breakfast, coffee, ice cream and malasadas, all with a very pretty outdoor area to sit and relax.'},
      {name:'Ippy’s Hawaiian BBQ',type:'restaurant',lat:20.0243792,lng:-155.6613774,free:false,desc:'Another well regarded Hawaiian BBQ restaurant. Think kalua pig, teriyaki, and loco moco.'},
      {name:'Ning\'s | Thai Cuisine',type:'restaurant',lat:19.4940856,lng:-154.945049,free:false,desc:'Very good Thai food. This place is authentically and seriously spiced. If you have any sensitivity to heat, make sure to let them know that, clearly, when ordering, and consider going a level lower than you normally would.'},
      {name:'The Coffee Shack',type:'restaurant',lat:19.4752736,lng:-155.892272,free:false,desc:'Coffee, breakfast and lunch, but the real reason to come here is the view of the bay. It might not look close to the ocean on the map, but it gives a great panoroma. Also, you\'re likely to be greeted by a large number of geckos who like to hang out on the lanai.'},
      {name:'Manago Restaurant',type:'restaurant',lat:19.4892272,lng:-155.9109887,free:false,desc:'This is an absolute staple of the Big Island. At over 100 years old, it has been given the James Beard American Classics Award.'},
      {name:'Teshima\'s Restaurant',type:'restaurant',lat:19.5418215,lng:-155.9288843,free:false,desc:'Do NOT miss Teshima. Started as a grocery in the early 1900s today it is fantastic Japanese-American food. It feels classic, but more importantly, the food is superb. They don\'t take reservations, but they guarantee that if you\'re in line, you will get seated, which means, if you\'re in line before the place closes, you will get fed.'},
      {name:'Our Founding Farmers Ice Cream Shop',type:'restaurant',lat:20.2382766,lng:-155.8318578,free:false,desc:'This is an absolutely fantastic local ice cream shop. They do some very interesting flavors made from local fruits and produce. In fact, they are often advertising to locals that they are buying produce. I highly recommend the chocolate and chili combined with the Suriname cherry.'},
      {name:'Kaleo\'s | Bar & Grill',type:'restaurant',lat:19.494162,lng:-154.9446022,free:false,desc:'Afford burgers, seafood, BBQ, and poke. Try the lilikoi (passionfruit) cheesecake.'},
      {name:'KaiLoki’s Restaurant Southernmost bar in the U.S',type:'restaurant',lat:19.0863531,lng:-155.7796578,free:false,desc:'This is a classic, roadside Hawaiian cafe. It\'s not fancy, and the food isn\'t going to win any awards, but it tastes good if you just did a long hike to the Green Sand Beach. It\'s super laid back.'},
      {name:'Hilo Brewing Company',type:'bar',lat:19.7060898,lng:-155.0691906,free:true,desc:'This is a craft brewery with a tasting room. I go for the Island Lager, because I just want beer flavored beer on a warm day.'},
      {name:'Kona Brewing Co.',type:'bar',lat:19.6430824,lng:-155.9975195,free:false,desc:'If you\'ve had one Hawaiian beer on the mainland, it\'s probably this one. It\'s a brewpub, so they have food too.'},
      {name:'Moon and Turtle',type:'bar',lat:19.7254179,lng:-155.0871554,free:false,desc:'This is a craft cocktail bar that does both new cocktails and the classics.'},
      {name:'Kuleana Rum Shack',type:'bar',lat:19.9140394,lng:-155.8791776,free:false,desc:'You can do rum tastings, mai tai classes, or just choose from the enormous menus of cocktails. The food is pretty good too.'},
      {name:'Kona Inn Restaurant',type:'bar',lat:19.6377484,lng:-155.9932741,free:false,desc:'Come for the mai tais, stay for the stunning view.'},
      {name:'Don the Beachcomber',type:'bar',lat:19.632295,lng:-155.990658,free:false,desc:'It\'s the Don the Beachcomber. It\'s mai tais.'},
      {name:'Lava Lava Beach Club',type:'bar',lat:19.9132977,lng:-155.8879458,free:false,desc:'This is a mai tai bar that is all about the location. Right on the beach, it\'s a perfect place to relax with a drink. Yeah, it\'s built for tourists, but who cares when you\'re drinking a tropical drink with a view like this.'},
      {name:'The Hidden Nēnē',type:'bar',lat:19.7236099,lng:-155.0862397,free:false,desc:'Considered to be one of the best mai tais on the Island, they do far more than just a mai tai.'},
      {name:'Huggo\'s',type:'bar',lat:19.6331134,lng:-155.9900502,free:false,desc:'This is considered one of the staples of Big Island beach bars. Decent mai tais and good views at sunset.'}
    ]
  },
  paris: {
    title:'Paris, France', center:[48.856, 2.347], zoom:13, total:69,
    stripeUrl:'https://buy.stripe.com/dRmdR99tE95herGexNenS04',
    places:[
      {name:'Élysée Palace',type:'site',lat:48.870416,lng:2.316754,free:false,desc:'This is the home of the President of France. It\'s an interesting building to see, and during European Heritage Days in the fall, you can actually see the interior.'},
      {name:'The Basilica of the Sacred Heart of Paris',type:'site',lat:48.886706,lng:2.343023,free:false,desc:'This is a relatively new basilica at Montmartre, at least for Paris, and therefore, overlooking Paris. It\'s a pretty great view from here. The church itself is relatively uninspiring, but around the corner at Montmartre Square is an enclave of artists, it\'s really cool.'},
      {name:'Montmartre',type:'site',lat:48.886666,lng:2.340195,free:false,desc:'This is a famous bohemian area of Paris. While the main square, Place du Tertre is often filled with artists.'},
      {name:'Cathédrale Notre-Dame de Paris',type:'site',lat:48.852968,lng:2.349902,free:false,desc:'This is the center of Paris. The cathedral is obviously famous, and it is worth a look around, particularly since the renovation after the fire.'},
      {name:'Quartier Pigalle',type:'site',lat:48.88219,lng:2.337281,free:false,desc:'This is a section of the city that was the center of the Bohemian life. It got its name from American GIs during WWII who frequented the women selling their services. Today, it\'s one of the hippest sections of the city full of restaurants, bars, etc.'},
      {name:'Église Saint-Sulpice',type:'site',lat:48.85101,lng:2.335009,free:false,desc:'Church in the Latin Quarter. The view from the top is fantastic, but is often times closed to the public.'},
      {name:'Eiffel Tower',type:'site',lat:48.85837,lng:2.294483,free:true,desc:'Yeah, so this is the Eiffel Tower. I don\'t think it needs a description.'},
      {name:'The Centre Pompidou',type:'site',lat:48.860642,lng:2.352245,free:false,desc:'This is the public library for Paris, as well as the largest modern art museum in Europe and a center for music and acoustic research.. The building is quite interesting. It is loved by about half of Parisians, and hated by the other half. I think it kind of looks like a gerbil cage. Unfortunately, it is closed for renovations until 2030, but you can still see the building, for now.'},
      {name:'Musée de Louvre',type:'site',lat:48.861014,lng:2.335858,free:false,desc:'This is the world\'s 2nd largest museum. It is dedicated to Renaissance art. It houses the Mona Lisa, Winged Victory, the Venus de Milo, and Hammurabi\'s Code.'},
      {name:'Musée d\'Orsay',type:'site',lat:48.859961,lng:2.326561,free:false,desc:'This is an art museum in an old train station designed by Gustav Eiffel. It is the main museum dedicated to impressionist art, and has the largest impressionist collection in the world (i.e. Monet, Manet, Cezanne, Renoir, Degas, Cassatt, and Whistler\'s Mother).'},
      {name:'Les Invalides',type:'site',lat:48.855274,lng:2.312503,free:false,desc:'This is Napoleon\'s Tomb. For a small man, it is an imposing tomb, and worth a visit.'},
      {name:'Tour Montparnasse',type:'site',lat:48.842129,lng:2.32197,free:false,desc:'This is the only skyscrapper inside the city limits of Paris. It is also one of the ugliest buildings in the world. There is an observation deck at the top, however, it is currently closed for a major renovation.'},
      {name:'Palais Garnier',type:'site',lat:48.871934,lng:2.331767,free:false,desc:'This is the opera house for Paris. It is one of the three most prestigious opera houses in the world (La Scala in Milan, and the Met in New York being the other two). The building is gorgeous, and there are tours. It\'s also pretty amazing to see an opera here, but it can be €€€€.'},
      {name:'Luxembourg Gardens',type:'site',lat:48.846222,lng:2.33716,free:false,desc:'This is one of the main parks in Paris. It\'s a really nice place to spend some time just chillin\'.'},
      {name:'Place Saint-Michel',type:'site',lat:48.853535,lng:2.343817,free:false,desc:'This is the centre of Saint-Michel/Le Quartier Latin. Essentially, this is the heart of the student section of Paris. On a nice day, the students from the Sorbonne will gather here and be intellectual.'},
      {name:'Père Lachaise Cemetery',type:'site',lat:48.861393,lng:2.393328,free:true,desc:'This is one of many old cemeteries in Paris, but this one is full of famous people. From Chopin and Moliere, to Oscar Wilde and Edith Pilaf, to Jim Morrison.'},
      {name:'Pont Neuf',type:'site',lat:48.85705,lng:2.341325,free:false,desc:'This is the oldest bridge in Paris. People tend to gather here and just enjoy a nice day out.'},
      {name:'Marché de Belleville',type:'site',lat:48.870379,lng:2.379283,free:false,desc:'This is one of the best food markets in the city. It\'s decidedly multi-cultural, giving off strong souk vibes'},
      {name:'Rodin Museum',type:'site',lat:48.855307,lng:2.315835,free:false,desc:'This is Rodin\'s former studio. The exhibit is amazing. It include the original "Thinker," "Burghers of Calais" but more impressive is the "Gates of Hell."'},
      {name:'Marche aux Puces',type:'site',lat:48.90226,lng:2.342399,free:false,desc:'This is the biggest flea market in Paris. Yeah, there is shopping here, but it needs to be seen. Also, there are regularly people playing jazz here.'},
      {name:'Square Suzanne Buisson',type:'site',lat:48.887999,lng:2.337654,free:false,desc:'Boule is French bocce, and while the French don\'t have a reputation for being as loud as their Italian cousins, games can get heated. This is a great little bouledrome for interacting with locals. You can get a boule set at just about any Decathlon in the city.'},
      {name:'Catacombs of Paris',type:'site',lat:48.833832,lng:2.332422,free:false,desc:'These are the underground tombs and tunnels of Paris. This is a really cool thing to see, but you have to book it in advance and it\'s not super cheap.'},
      {name:'Palace of Versailles',type:'site',lat:48.804865,lng:2.120355,free:false,desc:'This was the palace built by Louis XIV. It is a symbol of decadence and extravagance. It is also one of the reasons the French revolted under Louis XVI. It\'s a bit of a trek to get out to it, so if you want to go on a free day, plan ahead, and know you will be there most of the day.'},
      {name:'L\'Arc de Triomphe de l\'Etoile',type:'site',lat:48.873779,lng:2.295016,free:false,desc:'This is the monument to those who died in the French Revolution and the Napoleonic Wars. It\'s a pretty spectacular monument. Going to the top at sunset is worth it. You can see the lights come on all over the city. It\'s more than 200 steps up.'},
      {name:'Champs-Élysées',type:'site',lat:48.871691,lng:2.301822,free:false,desc:'This is likely the most exclusive street in the world. You can go shopping here, if you have millions of Euros to spend.'},
      {name:'Fondation Claude Monet',type:'site',lat:49.075384,lng:1.533702,free:false,desc:'This is the home of Claude Monet where he painted his famous "Waterlillies." The house is exactly the way it was when he lived there, as are the ground. Like Versailles, this is an all day trip, so make sure you are willing to give up a day in Paris to go out here.'},
      {name:'Au P\'tit Grec',type:'restaurant',lat:48.842767,lng:2.349561,free:false,desc:'Delicious crepes. They\'re not necessarily the most traditional, but they are fantastic.'},
      {name:'Quai Saint-Michel',type:'restaurant',lat:48.853481,lng:2.34538,free:false,desc:'This is the area along the river. It is a great place to bring food and wine and have lunch or dinner. Essentially, just go get some charcuterie, fromage, et pain.'},
      {name:'Les Deux Magots',type:'restaurant',lat:48.854052,lng:2.333106,free:false,desc:'This is a famous cafe in the Latin Quarter. It is where all the famous intellectuals and literary figures of during the late 1800s and early 1900s. It\'s a bit touristy, but a pretty cool place to see, considering who used to frequent it.'},
      {name:'Pierre Hermé',type:'restaurant',lat:48.851522,lng:2.332767,free:false,desc:'This is a patisserie with known for having some of the best macaron in Paris. Are they the best, who can really tell, but, if you like sweet, this is a MUST.'},
      {name:'L\'as du Fallafel',type:'restaurant',lat:48.857379,lng:2.359163,free:true,desc:'This is the best Middle Eastern food in Paris. It is truly a must visit, and worth the wait. But you will be eating it while walking down the street.'},
      {name:'Zerda Café Paris 10',type:'restaurant',lat:48.86917,lng:2.357268,free:false,desc:'This is the most famous couscous restaurant in Paris. Yes, that sounds weird, but couscous is an important part of modern French cuisine.'},
      {name:'Les Philosophes',type:'restaurant',lat:48.85733,lng:2.357494,free:false,desc:'This is an affordable, and fantastic French cafe. The chef refuses to use anything mass produced. The confit de canard (duck confit) is one of the best in the city.'},
      {name:'Aux Delices du Palais',type:'restaurant',lat:48.825866,lng:2.312687,free:false,desc:'This is one of the better boulangeries in Paris. Go for a sandwich or just a straight up baguette (I prefer the flute).'},
      {name:'La Créperie Saint Germain',type:'restaurant',lat:48.85327,lng:2.341705,free:false,desc:'If you\'re looking for good, simple crepes, look no further.'},
      {name:'Du Pain et des Idées',type:'restaurant',lat:48.871245,lng:2.36289,free:false,desc:'This is one of the best boulangeries in Paris. Try Les Escargots, these are not actually snails but pastries.'},
      {name:'Berthillon Glacier',type:'restaurant',lat:48.851677,lng:2.356703,free:false,desc:'Yes, it is famous. It is still the best ice cream in Paris. There are multiple locations to get it on the island. The cafe facing the back of Notre Dame is a bit more touristy.'},
      {name:'Grande Mosquée de Paris',type:'restaurant',lat:48.841842,lng:2.355172,free:false,desc:'The garden of the mosque is beautiful and they have good pastries and mint tea.'},
      {name:'L\'Écurie',type:'restaurant',lat:48.847244,lng:2.348084,free:false,desc:'Miniscule bistro, but like stepping back into the 1920s. The church is like a postcard, which is probably why it was the spot that Owen Wilson was picked up in "Midnight in Paris."'},
      {name:'Aux Lyonnais',type:'restaurant',lat:48.870745,lng:2.338788,free:false,desc:'This place was originally run by Chef Alain Ducasse, but was sold to the Dumon family. That did not make it any cheaper. But it is old, beautiful, and full of classic Lyonnais food.'},
      {name:'Pho tai',type:'restaurant',lat:48.822139,lng:2.361378,free:false,desc:'Known to be the best phô in France.'},
      {name:'Relais de l\'Entrecôte Saint-Germain',type:'restaurant',lat:48.854603,lng:2.332766,free:true,desc:'This is steak frites, and only steak frites. There is no menu, just tell the waiter how you want the steak cooked.  1. Au bleu is raw; only the outside heated. 2. Saignant is rare; the center is perceptibly warm. 3. À point is rare; the blood coagulated and the center is hot. 4. Bien is what Americans would call medium. 5. Bien cuit is medium well; the center is still a bit pink.'},
      {name:'Le Severo',type:'restaurant',lat:48.831997,lng:2.324575,free:false,desc:'A very good Parisian bistro. The tartare is particularly good, but you really can\'t go wrong with anything.'},
      {name:'Rimal',type:'restaurant',lat:48.881126,lng:2.312642,free:false,desc:'This is spectacular Lebanese food, and remember, this is Paris, which means it\'s probably the best Lebanese food not in Lebanon.'},
      {name:'Les 3 Frères',type:'restaurant',lat:48.887567,lng:2.353655,free:false,desc:'This is, quite simply, the best Algerian food north of Marseille. When I go to Paris, this is one of only two or three restaurants I 100% make time for.'},
      {name:'Chez Paul',type:'restaurant',lat:48.85282,lng:2.374342,free:false,desc:'One of the most traditional and classic French bistros left in Paris. Be ready for some old school French cooking. Not very expensive.'},
      {name:'La Jacobine',type:'restaurant',lat:48.853466,lng:2.338888,free:false,desc:'It\'s hard to find any cafe in Paris not jammed with tourists these days. La Jacobine is about as close as you can get. The food is good, and the atmosphere is very French.'},
      {name:'Le Tambour',type:'restaurant',lat:48.865416,lng:2.344658,free:false,desc:'Eccentric but fantastic bistro. A relative unicorn in Paris, it\'s open late and not expensive.'},
      {name:'Le Charivari',type:'restaurant',lat:48.842707,lng:2.329653,free:false,desc:'This is the place to go for tartare. So, get the tartare.'},
      {name:'Barthélémy',type:'restaurant',lat:48.854459,lng:2.325534,free:false,desc:'This is a traditional cheese shop. Emmanuel Macron buys all his cheese here, and while Macron might not be popular these days, it\'s hard to argue that a French president doesn\'t know his cheese.'},
      {name:'La Bague de Kenza',type:'restaurant',lat:48.86634,lng:2.376861,free:false,desc:'There are now multiple locations of this Algerian bakery, but this is the original and the biggest. It looks like no other bakery you\'ve ever seen, AND the baked goods are fantastic.'},
      {name:'Chez Fred, bouchon lyonnais depuis 1945',type:'restaurant',lat:48.881233,lng:2.289735,free:false,desc:'Lyon is the gastronomical capital of France, therefore it might be the gastronomical capital of the world. This is a fantastic traditional Lyonnais buchon.'},
      {name:'L\'Éclair de Génie Café',type:'restaurant',lat:48.8679213,lng:2.3439371,free:false,desc:'These are fancy eclairs, with flavors beyond the normal chocolate, coffee and vanilla. They might be the best eclairs in the world.'},
      {name:'Bar 228',type:'bar',lat:48.865328,lng:2.328128,free:false,desc:'This is a lounge with leather and a gorgeous back bar. It was also the Nazi HQ during WWII.'},
      {name:'La Closerie Des Lilas',type:'bar',lat:48.840144,lng:2.336043,free:false,desc:'Another institution. This is where Hemingway wrote "The Sun Also Rises." In the evening it works as a piano bar.'},
      {name:'Harry\'s New York Bar',type:'bar',lat:48.869202,lng:2.332069,free:true,desc:'This is a Paris institution that was frequented by the most important literary figures of the 1920s. Today it\'s still owned by the same family as when it was founded.'},
      {name:'Glass',type:'bar',lat:48.88149,lng:2.337239,free:false,desc:'This is a very good cocktail bar, and most importantly, it is open late, which is not always common in Paris.'},
      {name:'Moulin Rouge',type:'bar',lat:48.884123,lng:2.332252,free:false,desc:'This is the famous cabaret. They still do a cabaret show, which is €€€€, but definitely a sight to see. Keep in mind, it is a cabaret show, so it is, shall we say, for adults only.'},
      {name:'Paradis Latin',type:'bar',lat:48.847993,lng:2.352866,free:false,desc:'Besides the Moulin Rouge, this is the other big cabaret in Paris. It is less famous, slightly less expensive, but I think better. The building was designed by Gustav Eiffel. Again, this is a cabaret, so, think adults only.'},
      {name:'Au Petit Suisse',type:'bar',lat:48.849222,lng:2.339232,free:false,desc:'This is an old cafe that is well known for aperitifs.'},
      {name:'Le Syndicat',type:'bar',lat:48.871778,lng:2.353558,free:false,desc:'France has some unique liquors that can\'t be found anywhere else. This place dedicated to using these little known French liquors.'},
      {name:'Compagnie des vins surnaturels',type:'bar',lat:48.851614,lng:2.336273,free:false,desc:'France is known for wine. If you\'re looking for wine, search no further. This is wine bar with over 300 wines available.'},
      {name:'Delaville Café',type:'bar',lat:48.870772,lng:2.349147,free:false,desc:'This is a brasserie in an old brothel. It has all the flair of a grand building, and a beautiful terrace. The upstairs lounge is a fantastic place for aperitif.'},
      {name:'Le Baiser Salé',type:'bar',lat:48.859866,lng:2.347761,free:false,desc:'This is one of the premier jazz clubs in Paris. It\'s small and cheap. Oh, and there is no electronic amplification.'},
      {name:'38 Riv',type:'bar',lat:48.856472,lng:2.356533,free:false,desc:'This is an underground jazz club. Literally, it\'s underground, in a cave. It is one of the more special locations in Paris for live music.'},
      {name:'Silencio',type:'bar',lat:48.868989,lng:2.343399,free:false,desc:'Another jazz club in a city deeply connected to the genre. This one, however, is a bit different as it is only open to the public after midnight. It was also designed by recently deceased director David Lynch, so expect the surreal.'},
      {name:'Hotel Belmont',type:'bar',lat:48.869217,lng:2.29781,free:false,desc:'This is just a gorgeous cocktail lounge serving the classics and short walk to the Champs-Elysees.'},
      {name:'Legrand Filles et Fils',type:'bar',lat:48.866354,lng:2.339825,free:false,desc:'This is a wine bar. Maybe it is THE wine bar. Seriously, you can\'t imagine how much wine they have.'},
      {name:'L\'Escargot Montorgueil',type:'restaurant',lat:48.864204,lng:2.346698,free:false,desc:'I think it\'s pretty clear what they have, the most French of all foods, escargot, and many different types of it.'}
    ]
  },
  florence: {
    title:'Florence, Italy', center:[43.7696, 11.2558], zoom:14, total:44,
    stripeUrl:'https://buy.stripe.com/bJe7sL21cftFcjy75lenS05',
    places:[
      {name:'Accademia Gallery',type:'site',lat:43.776814,lng:11.258642,free:false,desc:'This is a very small museum with really only one big ticket item, Michelangelo\'s David. Buy tickets beforehand, and plan for about 30 minutes.'},
      {name:'Cathedral of Santa Maria del Fiore',type:'site',lat:43.773145,lng:11.25596,free:false,desc:'Il Duomo. It is the center of the city. If you don\'t see this place in Florence, you\'ve done Florence wrong. The outside is far more spectacular than the inside, particularly the doors, but it\'s worth a step inside. The view from the top of the Dome is fantastic. It involves a climb of around 463 steps through a narrow passage between the inner and outer shells of the dome.'},
      {name:'Pitti Palace',type:'site',lat:43.765153,lng:11.250008,free:false,desc:'This is the "new" Medici palace. It has gorgeous grounds you can walk around. A somewhat nice respite from the crowds.'},
      {name:'Palazzo Vecchio',type:'site',lat:43.769301,lng:11.256151,free:false,desc:'This is the Medici\'s old palace. It\'s worth a visit, particularly the Room of 500.'},
      {name:'Uffizi Gallery',type:'site',lat:43.767786,lng:11.255311,free:true,desc:'This is a Renaissance art museum. It\'s one of the best in the world. There are a number of famous pieces, like Botticelli\'s "Birth of Venus." My favorite, however, is Caravaggio\'s "Medusa."'},
      {name:'Basilica di San Lorenzo',type:'site',lat:43.774962,lng:11.253876,free:false,desc:'This church was considered to be the Medici\'s church. It\'s beautiful in it\'s own right, but the most incredible thing here is "La Stanza Segreta." This is a secret room only discovered in the 1970s. Michelangelo hid in this room during an exile, and the walls are covered in his drawings. They only allow 4 people in every 90 minutes, so make sure you get tickets well in advance.'},
      {name:'Piazzale Michelangelo',type:'site',lat:43.762931,lng:11.265056,free:false,desc:'This is a super famous spot for a view of the city. It is beautiful at sunset, and while it gets crowded, it is not unpleasantly crowded. The walk up the hill, however, is not necessarily the easiest.'},
      {name:'Scuola del Cuoio S.r.l.',type:'site',lat:43.768352,lng:11.263744,free:false,desc:'This is a school for training leather workers. Come here to see them working and you can buy nice leather goods.'},
      {name:'Basilica of Santa Croce in Florence',type:'site',lat:43.768568,lng:11.262268,free:false,desc:'This is a church on a huge piazza. In the church are a bunch of famous graves, including Michelango and Dante. The piazza is used for festivals, most famously cacio storico (which is a combination of rugby, soccer and boxing).'},
      {name:'Mercato del Porcellino',type:'site',lat:43.769987,lng:11.254271,free:false,desc:'One of the two leather markets in town. The more touristy of the two, but worth a visit. Also, pat the pig fountain on the nose for good luck.'},
      {name:'Piazza del Mercato Centrale',type:'site',lat:43.776643,lng:11.253786,free:true,desc:'The less touristy of the two big leather markets in town.'},
      {name:'Ponte Vecchio',type:'site',lat:43.767925,lng:11.253144,free:false,desc:'This is the old bridge in town. It is covered in jewelry stores. Also, running along the top is the Vasari Corridor (which you can get tickets to tour). It was a hallway built between the Uffizi and the Pitti Palace to let the Medicis go back and forth without getting accosted by unhappy Florentines.'},
      {name:'Brac',type:'restaurant',lat:43.767666,lng:11.258258,free:false,desc:'Hole in the wall that is popular with locals, and anything but traditional. Just get a mixed platter. You\'ll be happy.'},
      {name:'Il Guerrino',type:'restaurant',lat:43.580604,lng:11.302972,free:false,desc:'This is a tiny restaurant with a panoramic view of the valley. They cook all food on a focolare (fireplace). It is off the beaten path, so check hours before you go.'},
      {name:'La Cantinetta Di Rignana',type:'restaurant',lat:43.561069,lng:11.267167,free:false,desc:'This restaurant that uses fresh, seasonal ingredients from Tuscany. It has a fantastic terrace overlooking the vines. You can also have wine made from grapes on the property.'},
      {name:'Osteria Le Panzanelle',type:'restaurant',lat:43.518889,lng:11.311667,free:false,desc:'This is a little neighborhood restaurant with a nice area for outdoor dinning. Try the cacio e pepe, but definitely go for desserts too.'},
      {name:'Osteria Al Ponte',type:'restaurant',lat:43.466609,lng:11.434587,free:false,desc:'This restaurant is well known for a fantastic selection of Chianti wines. The food is good too; try the crostini neri and wild boar and porcini mushrooms.'},
      {name:'Arà: è Sicilia',type:'restaurant',lat:43.77623,lng:11.258433,free:false,desc:'This is Sicilian street food. Come here if you\'ve had your fill of wild boar ragu, truffles, and unsalted bread. Get the arancini and the cannoli.'},
      {name:'Zeb',type:'restaurant',lat:43.764095,lng:11.261202,free:false,desc:'This is a restaurant that used to be a grocery store. The current owners make all meals from local Tuscan foods.'},
      {name:'Osteria delle Tre Panche',type:'restaurant',lat:43.768535,lng:11.253913,free:false,desc:'This is a tiny restaurant with only three benches, but the things it does with truffles are amazing, and when you\'re in Florence, you need to eat truffles.'},
      {name:'Trattoria 13 Gobbi',type:'restaurant',lat:43.772345,lng:11.246775,free:false,desc:'This place is a little kitsch, but it is known for its bistecca and fagiole (steak and white beans), which is a Florentine speciality.'},
      {name:'Mercato Centrale',type:'restaurant',lat:43.776517,lng:11.253051,free:false,desc:'The refurbished central market. The first floor is butchers, fruit sellers, etc. The second floor has a bunch of very good prepared food stalls.'},
      {name:'Osteria Santo Spirito',type:'restaurant',lat:43.76652,lng:11.246794,free:false,desc:'This is a great little neighborhood osteria. It\'s well known simply for have fantastic food. Make a reservation as it is very popular. It opens at 7pm and people, even those with reservations, start lining up about 6:30pm.'},
      {name:'Vini E Vecchi Sapori',type:'restaurant',lat:43.77013,lng:11.256697,free:false,desc:'Tiny restaurant that does only traditional foods. Specialities include papardelle in duck ragu and ribollita.'},
      {name:'Vecchi',type:'restaurant',lat:43.768462,lng:11.249828,free:false,desc:'Vecchi is a chocolatier, but they also run gelaterias. While they have one right in the center of the city, this location is calmer and allows you to get a gelato and take in a beautiful view of Florence from the bridge.'},
      {name:'Kitsch 2',type:'restaurant',lat:43.778569,lng:11.257427,free:false,desc:'Apericena is a Florentine specialty. Normally, with an aperitivo you would get an asortment of snacks. With apericena you can order a drink and get an entire meal. Kitsch 2 is known for having one of the best in the city.'},
      {name:'Biscottificio Di Migliana Srl',type:'restaurant',lat:43.933368,lng:10.923104,free:false,desc:'The best cantucci in Tuscany. The chocolate with white chocolate chunks are delicious, but they\'re all good. Eat with some vin santo. Importantly, this bakery is not particularly easy to get to.'},
      {name:'Trattoria Sostanza',type:'restaurant',lat:43.772672,lng:11.247018,free:false,desc:'This is considered one of the best traditional trattorias in Florence. The recipes are nearly unchanged since the mid-1800s. The butter chicken is a signature dish.'},
      {name:'Osteria del Cinghiale Bianco',type:'restaurant',lat:43.767897,lng:11.250542,free:false,desc:'This is the type of place you want to go for delicious and traditional Tuscan meals. If it is Tuscan you can get it here, and it will be fantastic. It has more tourists in it earlier in the evening.'},
      {name:'Forno Ghibellina',type:'restaurant',lat:43.769344,lng:11.265332,free:false,desc:'It\'s a bit of a hike from the city center, but this is one of the best pastry shops in Florence. Everything is delicious, and if you like pistachio, you will certainly be pleased. If there is one caffe to visit for breakfast, it is this one.'},
      {name:'Ristorante Alla Vecchia Bettola Firenze',type:'restaurant',lat:43.766887,lng:11.240087,free:false,desc:'Despite being a little bit more difficult to get to, the penne alla vodka is apparently worth the hike.'},
      {name:'I Dolci Di Patrizio Cosi',type:'restaurant',lat:43.771351,lng:11.261926,free:false,desc:'Getting to the edge of the tourist center, this caffe has fantastic pastries and good coffee. In particular their chocolate cornetto is overflowing and a hit with children.'},
      {name:'Sophia Loren Restaurant Firenze',type:'restaurant',lat:43.772654,lng:11.253506,free:false,desc:'This might seem like an odd location, given how central it is in the city. But this is very good pizza, at a reasonable price, and is not inundated with tourists (possibly because they all thing it will be too touristy).'},
      {name:'Mercato di Sant’Ambrogio',type:'restaurant',lat:43.770496,lng:11.266915,free:false,desc:'This is the second market in Florence. It is much calmer, and off the beaten path. Try Panini e Semel for some Tuscan street food.'},
      {name:'Buca dell\'Orafo',type:'restaurant',lat:43.768454,lng:11.253986,free:true,desc:'This is a very traditional trattoria. It\'s a bit rough around the edges and bit more expensive than you would normally pay for traditional food, but it\'s good.'},
      {name:'Pasticceria Nencioni',type:'restaurant',lat:43.771533,lng:11.2656,free:false,desc:'It might be loud and chaotic, but it\'s some of the best pastries in Florence.'},
      {name:'Enoteca Spontanea',type:'restaurant',lat:43.76555,lng:11.248316,free:true,desc:'Yes, it\'s a wine bar that focuses on spontaneously fermented wines, but after 7:30 it becomes an intimate restaurant with fantastic food. Run by a brother and sister team, all the food is fantastic, but the chocolate cake is to die for.'},
      {name:'Piazza Fra\' Girolamo Savonarola',type:'bar',lat:43.78162,lng:11.266492,free:false,desc:'Just outside the historic center, this square is not the most beautiful, but it is full of locals living their lives - kids playing soccer and riding scooters, people walking their pets, and locals sitting on a bench enjoying an aperitivo from a  hut that sells cheap Aperol Spritzes. The hut is only open in the warmer months, so if you\'re there before late-March, you might be out of luck.'},
      {name:'Grand Hotel Minerva',type:'bar',lat:43.773905,lng:11.249034,free:false,desc:'The bar on the roof of this hotel is incredible, and it is also where the Negroni was invented.'},
      {name:'Ristorante Il Vescovino',type:'bar',lat:43.5475,lng:11.310556,free:false,desc:'The view is incredible. Sit in the naturally shaded terrace and have a glass of wine.'},
      {name:'Oblate Library',type:'bar',lat:43.772316,lng:11.259964,free:false,desc:'This is a library. It is an old library. Go to the top floor and there is a caffe with aperitivo with the most spectacular view you\'ll ever see. It will also feel like you\'re not in the right place. You are, just ask for direction to the caffe.'},
      {name:'Le Volpi e l\'Uva',type:'bar',lat:43.766999,lng:11.252828,free:true,desc:'This is a wine bar with a huge selection of Tuscan wines. They will even bring you on a Tuscan wine flight. It can, however, get crowded, like everything in Florence, so be prepared to wait a bit.'},
      {name:'Le Murate - Caffe Lettterario',type:'bar',lat:43.769296,lng:11.267891,free:false,desc:'A very nice place for aperitivo, but it\'s really apericena, where the food you get with the purchase of a cocktail might as well be dinner. Not as robust an apera-cena as Kitsch 2, but quite good, and it\'s in an old prison, which is cool.'},
      {name:'Santarosa Bistrot',type:'bar',lat:43.771635,lng:11.240409,free:false,desc:'Definitely away from the touristy crowds, this is a great spot for an evening drink, particularly in the summer months when you can sit outside in their garden.'}
    ]
  },
  amsterdam: {
    title:'Amsterdam & Brussels', center:[52.370, 4.895], zoom:13, total:50,
    stripeUrl:'https://buy.stripe.com/aFa4gz9tE1CP5VablBenS0a',
    places:[
      {name:'\'t Smalle',type:'bar',lat:52.3767128,lng:4.8841696,free:true,desc:'This is an old brown bar in a pretty two-story building. It has beautiful views of Egelantiersgracht.'},
      {name:'cafe twee prinsen',type:'bar',lat:52.3779216,lng:4.8864545,free:false,desc:'Another brown bar. Very pretty interior. Extremely laid back and pleasant. You get free snacks!'},
      {name:'Café Chris',type:'bar',lat:52.3742752,lng:4.8816114,free:false,desc:'This is one of the oldest cafes in Amsterdam, dating from 1624. It is frequented by locals, and has absolutely NO pretense. It is cash-only.'},
      {name:'Tolbar',type:'bar',lat:52.3527291,lng:4.9066757,free:false,desc:'This is one of the best terraces in Amsterdam. They have beach chairs and on a sunny day, it is perfect for grabbing a drink and soaking up the rare Dutch sun.'},
      {name:'Café \'t Hooischip',type:'bar',lat:52.3665131,lng:4.9017508,free:false,desc:'This is a more touristy area, but this is a local cafe that doesn\'t get frequented by tourists. They have a good beer selection, and serve beer from Brouwerij \'t IJ, which is the lesser known Amsterdam brewery.'},
      {name:'Eetcafé \'t Pakhuis',type:'bar',lat:52.3682008,lng:4.8906417,free:false,desc:'This is on a tiny street away from everything. Think dark woods on the inside with good traditional food and beers. There is also a bar cat, so that\'s a win.'},
      {name:'\'t Aepjen',type:'bar',lat:52.3762704,lng:4.9001675,free:false,desc:'This is a super old bar. It used to be frequented by sailors in the 17th and 18th centuries. Its is extremely traditional. Some sailors would even drink so much that they’d lose their money and be forced to sell their pet monkeys to the bar (who lived upstairs) as payment for their drinks.  Eventually, there were too many monkeys, which is how the Amsterdam Zoo began.'},
      {name:'Café ‘t Sluisje',type:'bar',lat:52.3912275,lng:4.9382328,free:false,desc:'This is a bar in a building dating from the mid-1500s. It is about as far from feeling like you\'re in Amsterdam as possible.'},
      {name:'Cafe Tabac',type:'bar',lat:52.3801768,lng:4.8885231,free:false,desc:'A traditional bruin cafe, but it has really nice outdoor areas, which are perfect for a sunny day and provides for nice views.'},
      {name:'Tales & Spirits',type:'bar',lat:52.3761301,lng:4.8917236,free:false,desc:'This is a cool cocktail bar, with a real mixologist and nice bar snacks.'},
      {name:'Café Panache',type:'bar',lat:52.3656699,lng:4.8678817,free:false,desc:'This is a pretty nice cocktail bar. Its is chic, but laid back. They also have a very good seafood platter.'},
      {name:'Waterkant',type:'restaurant',lat:52.3698158,lng:4.8763487,free:false,desc:'Surinamese food with a good beer selection and beautiful views, especially on a sunny day (which are few and far between).'},
      {name:'Het Zaanse Pannenkoeken Paleis',type:'restaurant',lat:52.4392056,lng:4.8265077,free:false,desc:'This is a pancake restaurant known for having fantastic views of the Zaan. You can watch the ships come and go while enjoying the hell out of some delicious Dutch savory pancakes.'},
      {name:'De Carrousel Pannenkoeken Amsterdam',type:'restaurant',lat:52.3589597,lng:4.8917027,free:false,desc:'This is on the location of an old carousel, thus the name. The pancakes are supposed to be the best in Amsterdam.'},
      {name:'Pannenkoekenboot Amsterdam',type:'restaurant',lat:52.4004825,lng:4.8915332,free:false,desc:'This combines two very Dutch things, pancakes and boats. It is a 75 minute ride through the canals while you eat pancakes.'},
      {name:'Sampurna',type:'restaurant',lat:52.3668248,lng:4.8901912,free:false,desc:'A very good Indonesian restaurant. Pop in for a rijstafel, It is known for it\'s HOT sambal.'},
      {name:'Les Brasseries Georges',type:'restaurant',lat:50.8116725,lng:4.3681411,free:false,desc:'This is one of the best places to go for french fries in Brussels. It has a selection of oils you can have your potatoes fried in.'},
      {name:'Pancakehouse Upstairs',type:'restaurant',lat:52.369285,lng:4.893423,free:true,desc:'Pancakes in the smallest restaurant in Europe. It\'s only 4 tables, accessed via a very narrow staircase that is typical of Amsterdam canal houses. Worth it.'},
      {name:'Pension Homeland',type:'restaurant',lat:52.3730206,lng:4.9167427,free:false,desc:'This is a brewery and restaurant all inside a small boutique hotel. On a nice day, you can sit right by the water and enjoy your drink/food.'},
      {name:'Eiburgh Snacks',type:'restaurant',lat:52.3708538,lng:4.9630339,free:false,desc:'Come here for french fries. They\'re the best in the city, hands down. Importantly, it is in an old shipping container. In the container next door  you\'ll find an old man jamming out while cutting potatoes.'},
      {name:'Pompet',type:'restaurant',lat:52.3950808,lng:4.9205137,free:false,desc:'This is a French oriented restaurant, but it is a beautiful setting. There is space to place boule (it\'s like bocce, but more French).'},
      {name:'Paon Bali',type:'restaurant',lat:52.3769385,lng:4.9433835,free:false,desc:'This is considered by many Indonesian people to be the best Indonesian food in Amsterdam. It\'s inexpensive, authentic, large portions.'},
      {name:'Braai Vondelpark',type:'restaurant',lat:52.3561985,lng:4.8544504,free:false,desc:'This is South African BBQ. This pork belly, sausage, ribs, all the things Afrikaaners do. There might be a wait, but it\'s worth it. Get your food and sit out along the canal if it\'s sunny.'},
      {name:'The Papeneiland Café',type:'restaurant',lat:52.3804758,lng:4.8880228,free:false,desc:'This is where you go for Dutch pie (vlaai). There is also a tunnel that Catholics used to use to go to a secret church when Catholicism was outlawed.'},
      {name:'Haring & Zo',type:'restaurant',lat:52.3730108,lng:4.8902535,free:true,desc:'This is one of the few cured herring stalls left in the city. It is about as authentic Dutch as you can get.'},
      {name:'Patisserie Kuyt V.O.F.',type:'restaurant',lat:52.3624534,lng:4.8989267,free:false,desc:'This is the best patisserie in Amsterdam. I\'m partial to always having vlaai in the Netherlands, but try the appelschnitt (it\'s raisins, cinnamon, and apples in a puff pastry).'},
      {name:'De Kas',type:'restaurant',lat:52.3522063,lng:4.9302736,free:false,desc:'This is a very chic restaurant. It\'s inside a greenhouse dating from the early 20th century. It\'s prix fixe, farm to table. Bring your wallet!'},
      {name:'Hollands Hap Hmm Restaurant',type:'restaurant',lat:52.3636729,lng:4.876325,free:false,desc:'Quintessential Dutch food since the 1930s. Schnitzel and meatballs for small prices but big portions.'},
      {name:'Wilde Zwijnen',type:'restaurant',lat:52.3635846,lng:4.9404468,free:false,desc:'This is a high-end restaurant that has specialized in game, particularly wild boar. It is a 3-4 course menu with a good wine selection.'},
      {name:'Pesca Vis Seafood Restaurant Amsterdam',type:'restaurant',lat:52.372763,lng:4.8788041,free:false,desc:'So, this is gonna be weird, but it\'s fish theater. They give you a glass of champagne, and then you pick the fish you want to eat, literally. They show it to you on ice, you pick it, and then they prepare it for you.'},
      {name:'Brouwerij \'t IJ',type:'site',lat:52.3666901,lng:4.9264241,free:false,desc:'Forego Heineken and come to this brewery. They make extremely good beer, and they\'re next to a giant old windmill. They also do tastings.'},
      {name:'Rijksmuseum',type:'site',lat:52.3599976,lng:4.8852188,free:true,desc:'This is THE museum in Amsterdam. Think Dutch masters like Reubens and Rembrandt. A must visit in the city. Also, go to the Cuypers Library. Yeah, it\'s a library, but it\'s more than a library. This is an art history library, and MY GOD, you have to see it.'},
      {name:'Van Gogh Museum',type:'site',lat:52.3584159,lng:4.8810756,free:false,desc:'This is probably one of the coolest museums in the world. It is the largest collection of Van Goghs in one place, but the layout is fantastic too. It\'s all devised to be chronological walk through Van Gogh\'s work. Get tickets in advance.'},
      {name:'Anne Frank House',type:'site',lat:52.3752182,lng:4.8839765,free:false,desc:'Very little needs to be said about this site. It is the house that Anne Frank hid in during WWII. It is somber, but should be seen.'},
      {name:'Heineken Experience',type:'site',lat:52.3578313,lng:4.8918249,free:false,desc:'It\'s the Heineken brewery. There\'s a tour, and probably some beer to drink too.'},
      {name:'Red Light District Amsterdam Centrum',type:'site',lat:52.3740194,lng:4.8999505,free:false,desc:'A unique and historic neighborhood with its own culture and energy quite separate from its reputation. Worth walking through to get a sense of a side of Amsterdam that most cities don\'t have.'},
      {name:'Eye Film Museum',type:'site',lat:52.384348,lng:4.901276,free:false,desc:'This is a cool modernist building that houses a cool museum to film and cinema. It\'s a free ferry ride across the IJ.'},
      {name:'Rembrandt House Museum',type:'site',lat:52.369369,lng:4.9012351,free:false,desc:'This is Rembrandt\'s old studio and his living area, which he stayed in for almost 20 years in the 17th century.'},
      {name:'Hortus Botanicus Amsterdam',type:'site',lat:52.3666659,lng:4.9081845,free:false,desc:'One of the oldest botanical garden in Europe. Think old 1800s greenhouses, some filled with tropical plants. There\'s even a colonial seed house.'},
      {name:'ARTIS',type:'site',lat:52.3660003,lng:4.9165321,free:false,desc:'This is the Amsterdam Zoo. It has all those monkeys people used to buy beer.'},
      {name:'Vondelpark',type:'site',lat:52.3579946,lng:4.8686484,free:false,desc:'This is Amsterdam\'s answer to Central Park. It\'s good for strolling, picnicking, and anything else you would do in a park. There are sculptures throughout, even one by Picasso.'},
      {name:'House of Bols, the Cocktail & Genever Experience',type:'site',lat:52.3591201,lng:4.8812169,free:false,desc:'Wasn\'t sure whether this was a tourist site or a bar. This is a museum dedicated to Dutch gin. The tour ends with a cocktail in the bar.'},
      {name:'Stromma - Keizersgracht',type:'site',lat:52.3654522,lng:4.8867961,free:false,desc:'You can rent a paddleboat and tour the canals from here. A lovely way to see the city from the water. The canals carry active boat traffic, so stay alert and follow the instructions given by your rental operator'},
      {name:'Nieuwe Spiegelstraat',type:'site',lat:52.3641147,lng:4.8892946,free:false,desc:'This is a weird little street with antique shops, all dedicated to different things. It\'s worth just popping in to see what weird stuff is for sale.'},
      {name:'Bloemenmarkt',type:'site',lat:52.3668379,lng:4.8913087,free:false,desc:'This is the Amsterdam flower market. It is the only floating flower market in the world, and is 100% worth visiting given the fact that the Dutch do flowers right.'},
      {name:'Oudemanhuispoort',type:'site',lat:52.3692781,lng:4.8960005,free:false,desc:'This is an old print, book and sheet music market. It\'s like stepping into the past. Rumor has it that Van Gogh frequented this market.'},
      {name:'A\'DAM Lookout',type:'site',lat:52.383863,lng:4.902355,free:false,desc:'If you want a view of Amsterdam, this is it. It\'s on the 22nd story of a building that was once the HQ for Dutch Royal Shell. There is also Europe\'s highest swing up here.'},
      {name:'Ons\' Lieve Heer op Solder (Our Lord in the Attic Museum - Former Hidden Catholic Church)',type:'site',lat:52.3751438,lng:4.8994358,free:true,desc:'Catholicism was outlawed in the 16th and 17th centuries. Catholics tried to worship in places where they wouldn\'t get caught. In the attic of this house is a tiny little Catholic Church. All decked out trying to be a Cathedral.'},
      {name:'Keukenhof',type:'site',lat:52.2697087,lng:4.5469336,free:false,desc:'Technically not in Amsterdam, but worth the visit out of town. This is one of the most exquisite floral gardens you will ever visit. You can get to Lisse by train. It\'s not far; the Netherlands is small.'},
      {name:'Kröller-Müller Museum',type:'site',lat:52.0955802,lng:5.8174162,free:false,desc:'Another one technically not in Amsterdam, but worth leaving the city for. This is a museum that was once a private collection of art. If you want to see Van Gogh, you have to come here. Some of his most famous pieces, like Cafe Terrace at Night.'}

      {name:'Westminster Abbey',type:'site',lat:51.499292,lng:-0.12731,free:true,desc:'The oldest cathedral in London. Royal weddings happen here. It also has Poets\' Corner, which is the burial place for dozens of super famous people from Lord Byron to Isaac Newton.'},
      {name:'Tower of London',type:'site',lat:51.508112,lng:-0.075949,free:true,desc:'This is the first castle build by William the Conqueror after taking Britain. Full of history, it is also where the British Crown Jewels are held, which are truly a sight to behold..'},
      {name:'St. Paul\'s Cathedral',type:'site',lat:51.513845,lng:-0.098351,free:false,desc:'This is a beautiful Anglican cathedral designed by renowned London architect Sir Christopher Wren and built between 1645 and 1710. It is one of the most beautiful churches in all of Britain. The dome can be visited. It involves a significant climb of around 530 steps.'},
      {name:'Big Ben',type:'site',lat:51.500729,lng:-0.124625,free:false,desc:'This is the most famous clock in the world. It is a sight to see, and more importantly, hear. Try and be here on the hour to hear the enormous bells rings. It is also possible to do tours inside Elizabeth Tower.'},
      {name:'The British Museum',type:'site',lat:51.519413,lng:-0.126957,free:false,desc:'This is one of the most incredible history and anthropology museums in the world, despite the controversies surrounding it. It holds the Rosetta Stone, the frieze from the Parthenon, and a huge Egyptology section.'},
      {name:'Speakers\' Corner',type:'site',lat:51.511894,lng:-0.159366,free:false,desc:'This is the spot that people were allowed to gather and say anything they pleased, including being critical of the royals. Today, you\'ll often still find people standing here making their pleas and arguments.'},
      {name:'Palace of Westminster',type:'site',lat:51.499479,lng:-0.124809,free:false,desc:'This is the home of the British Parliament. It is a beautiful building, and the tour is 100% worth it.'},
      {name:'Buckingham Palace',type:'site',lat:51.501364,lng:-0.14189,free:false,desc:'This is the King\'s residence in London. They usually do the changing of the guard here at 11am, which is filled with all the normal royal pomp.. It fills up quickly, so it\'s usually a good idea to get there early. Also, make sure it is happening that day before you go because it isn\'t every day..'},
      {name:'St Dunstan in the East Church Garden',type:'site',lat:51.509715,lng:-0.08246,free:false,desc:'This is the remnants of a church built in the 12th century that was bombed in WWII. The ruins are now engulfed by trees and vines. Worth a stop if you\'re near the Tower of London.'},
      {name:'Harrods',type:'site',lat:51.499406,lng:-0.163234,free:false,desc:'This is the biggest department store in London and it is worth going to see. The Egyptian Room is particularly impressive. Also, if you want to see how the 1% of London spend their money, this is where you go.'},
      {name:'Warner Bros. Studio Tour London',type:'site',lat:51.689752,lng:-0.418146,free:false,desc:'If you\'re traveling with children, this is a great place. It is where Harry Potter was filmed, and you can go see all the sets.'},

      {name:'Churchill War Rooms',type:'site',lat:51.502086,lng:-0.12873,free:false,desc:'This was the bunker that Churchill used during WWII. Much of the British decision making in the war happened in these bunkers. It is now a pretty cool museum that is designed to look like it did during the war.'},
      {name:'Little Venice',type:'site',lat:51.523484,lng:-0.183885,free:false,desc:'This is a gorgeous area of tree lined canals, with colorful boats and tearooms and cafes. Worth walking through on a nice day.'},
      {name:'Neal\'s Yard',type:'site',lat:51.514472,lng:-0.126353,free:false,desc:'This is a pretty alley that is full of colorful buildings, shops, and cafes.'},
      {name:'Tate Modern',type:'site',lat:51.507595,lng:-0.099356,free:false,desc:'This is the main modern art museum in London, many would argue the best art museum in Britain. If you enjoy modern art, it is worth a visit.'},
      {name:'Shakespeare\'s Globe',type:'site',lat:51.508076,lng:-0.097194,free:false,desc:'This is a bit of a tourist trap, but it is a perfect recreation of Shakespeare\'s Globe Theater. The original Globe is a few blocks to the east. They still perform Shakespeare\'s plays here.'},
      {name:'The Sherlock Holmes Museum',type:'site',lat:51.523767,lng:-0.158556,free:false,desc:'There is no 221B Baker Street doesn\'t exist, but this is as close as you can get. It\'s a cool little museum dedicated to the grandfather of all literary detectives.'},

      {name:'10 Downing St',type:'site',lat:51.5034,lng:-0.127726,free:false,desc:'This is the home of the Prime Minister. You can\'t really visit here for security reasons, but it is worth walking past and looking down the street. 7-10 Adam St. is a near replica of 10 Downing, and you can take a photo in front of it.'},

      {name:'Abbey Road Studios',type:'site',lat:51.532075,lng:-0.178076,free:false,desc:'This is the world famous Beatles\' studio. While touring the studio is not usually allowed, you can use the zebra (crosswalk) right outside that was on the cover of the famous Beatles album. You can also mark up the famous graffiti wall.'},

      {name:'Royal Botanic Gardens',type:'site',lat:51.483711,lng:-0.289687,free:false,desc:'This garden has the largest and most diverse collection of living plants in the world. It\'s also a UNESCO World Heritage Site. The rest of Kew Gardens is also worth a walk around.'},
      {name:'Primrose Hill',type:'site',lat:51.5395226,lng:-0.1606499,free:false,desc:'This is a great place to take in a view of the entirety of London. On a nice day, it\'s a great place for a picnic.'},
      {name:'Trafalgar Square',type:'site',lat:51.508039,lng:-0.128069,free:false,desc:'This is a big public square commemorating the Battle of Trafalgar. In the middle is the Nelson Column. It is also an important place politically, as it has hosted multiple protests, including a riot over Bloody Sunday.'},

      {name:'Rules Restaurant',type:'restaurant',lat:51.510798,lng:-0.123163,free:true,desc:'This is one of the oldest, if not the oldest restaurants in London, and one of the most important. It shows up in literature, and was even frequented by Lawrence Olivier. It is classic British cuisine, but they specialize in game. Dress is smart casual, no kids after 7pm'},

// State
var currentUser = null;
var activePurchases = [];
var currentMap = 'rome';
var currentFilter = 'all';
var leafletMap = null;
var markers = [];
var liveMarker = null;
var accuracyCircle = null;
var watchId = null;
var hasZoomedToUser = false;
var isSignUp = false;

// Auth state observer
auth.onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
    getActivePurchases(user.uid).then(function(purchases) {
      activePurchases = purchases;
      showApp();
    });
  } else {
    currentUser = null;
    activePurchases = [];
    showAuth();
  }
});

function showAuth() {
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('mainApp').style.display = 'none';
}

function showApp() {
  document.getElementById('authScreen').classList.add('hidden');
  var app = document.getElementById('mainApp');
  app.style.display = 'flex';
  if (!leafletMap) initMap();
  buildTabs();
  loadMap(currentMap);
  renderShop();
}

function toggleAuthMode() {
  isSignUp = !isSignUp;
  document.getElementById('authTitle').textContent = isSignUp ? 'Create Account' : 'Sign In';
  document.getElementById('authSubmitBtn').textContent = isSignUp ? 'Create Account' : 'Sign In';
  document.getElementById('authSwitch').innerHTML = isSignUp
    ? 'Already have an account? <a onclick="toggleAuthMode()">Sign in</a>'
    : 'No account? <a onclick="toggleAuthMode()">Create one</a>';
  document.getElementById('authError').textContent = '';
}

function submitAuth() {
  var email = document.getElementById('authEmail').value.trim();
  var password = document.getElementById('authPassword').value;
  var errEl = document.getElementById('authError');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; return; }
  var fn = isSignUp
    ? auth.createUserWithEmailAndPassword(email, password)
    : auth.signInWithEmailAndPassword(email, password);
  fn.catch(function(e) {
    errEl.textContent = e.message.replace('Firebase: ','').replace(/\(auth.*\)\.?/,'').trim();
  });
}

function signInGoogle() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function() {
    document.getElementById('authError').textContent = 'Google sign-in failed. Please try again.';
  });
}

function doSignOut() {
  auth.signOut();
}

// Purchase tracking
function getActivePurchases(userId) {
  var now = firebase.firestore.Timestamp.now();
  return db.collection('mapPurchases')
    .where('userId', '==', userId)
    .where('expiresAt', '>', now)
    .get()
    .then(function(snap) {
      return snap.docs.map(function(d) { return d.data().mapKey; });
    });
}

function recordPurchase(userId, mapKey) {
  var now = new Date();
  var expires = new Date(now);
  expires.setFullYear(expires.getFullYear() + 1);
  return db.collection('mapPurchases').add({
    userId: userId,
    mapKey: mapKey,
    mapName: MAPS[mapKey] ? MAPS[mapKey].title : mapKey,
    purchasedAt: firebase.firestore.Timestamp.fromDate(now),
    expiresAt: firebase.firestore.Timestamp.fromDate(expires),
    active: true
  });
}

function hasAccess(mapKey) {
  return activePurchases.indexOf(mapKey) !== -1;
}

// Map init
function initMap() {
  leafletMap = L.map('map', { zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(leafletMap);
}

// Tabs
function buildTabs() {
  var bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  Object.keys(MAPS).forEach(function(key) {
    var btn = document.createElement('button');
    btn.className = 'tab-btn' + (key === currentMap ? ' active' : '');
    btn.id = 'tab_' + key;
    btn.textContent = MAPS[key].title;
    btn.onclick = function() { switchMap(key); };
    bar.appendChild(btn);
  });
}

function switchMap(key) {
  currentMap = key;
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.f-all').classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var t = document.getElementById('tab_' + key);
  if (t) t.classList.add('active');
  loadMap(key);
  closePopup();
}

// Load map data
function loadMap(key) {
  var md = MAPS[key];
  if (!md) return;
  leafletMap.setView(md.center, md.zoom);
  markers.forEach(function(m) { leafletMap.removeLayer(m); });
  markers = [];
  var owned = hasAccess(key);
  var sorted = md.places.slice().sort(function(a,b) { return (b.free?1:0)-(a.free?1:0); });
  sorted.forEach(function(place) {
    if (!place.free && !owned) return;
    var color = place.type === 'restaurant' ? '#e05a2b' : place.type === 'bar' ? '#6a3fd4' : '#1a8c5e';
    var icon = L.divIcon({
      className: '',
      html: '<div style="width:10px;height:10px;border-radius:50%;background:' + color + ';border:2px solid rgba(255,255,255,0.7);box-shadow:0 1px 4px rgba(0,0,0,0.5);"></div>',
      iconSize: [10,10], iconAnchor: [5,5]
    });
    var marker = L.marker([place.lat, place.lng], { icon: icon });
    marker.on('click', function() { showPopup(place); });
    marker.addTo(leafletMap);
    markers.push(marker);
  });
  renderList(sorted, owned);
  updateUnlockBanner(key, owned);
}

// Sidebar
function renderList(sorted, owned) {
  var list = document.getElementById('placesList');
  list.innerHTML = '';
  sorted.forEach(function(place) {
    var visible = place.free || owned;
    if (currentFilter !== 'all' && currentFilter !== place.type) return;
    var item = document.createElement('div');
    item.className = 'place-item' + (!visible ? ' locked' : '');
    item.innerHTML =
      '<div class="place-dot ' + place.type + '"></div>' +
      '<div><div class="place-name">' + place.name + '</div>' +
      (!visible ? '<div class="place-lock">Purchase to unlock</div>' : '') +
      '</div>';
    if (visible) {
      item.onclick = function() {
        showPopup(place);
        leafletMap.setView([place.lat, place.lng], 16);
      };
    }
    list.appendChild(item);
  });
  document.getElementById('sidebarUnlockBtn').style.display = owned ? 'none' : 'block';
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var md = MAPS[currentMap];
  var owned = hasAccess(currentMap);
  var sorted = md.places.slice().sort(function(a,b) { return (b.free?1:0)-(a.free?1:0); });
  renderList(sorted, owned);
}

function updateUnlockBanner(key, owned) {
  var banner = document.getElementById('unlockBanner');
  var mobilebtn = document.getElementById('mobileUnlock');
  if (owned) {
    banner.style.display = 'none';
    if (mobilebtn) mobilebtn.style.display = 'none';
  } else {
    var free = MAPS[key].places.filter(function(p) { return p.free; }).length;
    document.getElementById('unlockText').textContent = 'Showing ' + free + ' free preview spots';
    banner.style.display = 'flex';
    if (mobilebtn) mobilebtn.style.display = 'block';
  }
}

// Popup
function showPopup(place) {
  document.getElementById('popupType').textContent = place.type.charAt(0).toUpperCase() + place.type.slice(1);
  document.getElementById('popupName').textContent = place.name;
  document.getElementById('popupDesc').textContent = place.desc || '';
  document.getElementById('popupDirections').href = 'https://www.google.com/maps/dir/?api=1&destination=' + place.lat + ',' + place.lng;
  document.getElementById('placePopup').classList.add('open');
}

function closePopup() {
  document.getElementById('placePopup').classList.remove('open');
}

// Location
function toggleLocation() {
  if (watchId === null) { startLocation(); } else { stopLocation(); }
}

function startLocation() {
  if (!navigator.geolocation) return;
  document.getElementById('locateBtn').classList.add('active');
  watchId = navigator.geolocation.watchPosition(
    function(pos) {
      var lat = pos.coords.latitude, lng = pos.coords.longitude, acc = pos.coords.accuracy;
      if (!liveMarker) {
        liveMarker = L.marker([lat,lng], {
          icon: L.divIcon({ className:'', html:'<div class="live-dot"></div>', iconSize:[16,16], iconAnchor:[8,8] })
        }).addTo(leafletMap);
      } else { liveMarker.setLatLng([lat,lng]); }
      if (!accuracyCircle) {
        accuracyCircle = L.circle([lat,lng], { radius:acc, color:'#b8975a', weight:1, fillColor:'#b8975a', fillOpacity:.12 }).addTo(leafletMap);
      } else { accuracyCircle.setLatLng([lat,lng]); accuracyCircle.setRadius(acc); }
      if (!hasZoomedToUser) { leafletMap.setView([lat,lng], 16); hasZoomedToUser = true; }
    },
    function() { stopLocation(); },
    { enableHighAccuracy:true, maximumAge:5000, timeout:15000 }
  );
}

function stopLocation() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  document.getElementById('locateBtn').classList.remove('active');
  if (liveMarker) { leafletMap.removeLayer(liveMarker); liveMarker = null; }
  if (accuracyCircle) { leafletMap.removeLayer(accuracyCircle); accuracyCircle = null; }
  hasZoomedToUser = false;
}

// Shop
function openShop() { document.getElementById('shopScreen').classList.add('open'); renderShop(); }
function closeShop() { document.getElementById('shopScreen').classList.remove('open'); }

function renderShop() {
  var grid = document.getElementById('shopGrid');
  grid.innerHTML = '';
  Object.keys(MAPS).forEach(function(key) {
    var m = MAPS[key];
    var owned = hasAccess(key);
    var card = document.createElement('div');
    card.className = 'map-card';
    card.innerHTML =
      '<div><div class="map-card-name">' + m.title + '</div>' +
      '<div class="map-card-meta">' + m.total + ' curated places</div></div>' +
      '<div style="text-align:right"><div class="map-card-price">$2.99</div>' +
      (owned
        ? '<button class="buy-btn owned">Owned</button>'
        : '<button class="buy-btn" onclick="purchaseMap(\'' + key + '\')">Buy</button>') +
      '</div>';
    grid.appendChild(card);
  });
}

function purchaseMap(mapKey) {
  window.open(MAPS[mapKey].stripeUrl, '_blank');
}

// Sidebar toggle
function toggleSidebar() {
  var sb = document.getElementById('sidebar');
  var btn = document.getElementById('sidebarToggle');
  var legend = document.getElementById('mapLegend');
  var mob = document.getElementById('mobileUnlock');
  var sbBtn = document.getElementById('sidebarUnlockBtn');
  sb.classList.toggle('open');
  if (sb.classList.contains('open')) {
    btn.style.left = '348px';
    btn.textContent = 'Close';
    if (legend) legend.style.display = 'none';
    if (mob) mob.style.setProperty('display','none','important');
    if (sbBtn && !hasAccess(currentMap)) sbBtn.style.display = 'block';
  } else {
    btn.style.left = '0';
    btn.textContent = 'Places';
    if (legend) legend.style.display = '';
    if (mob && !hasAccess(currentMap)) mob.style.removeProperty('display');
    if (sbBtn) sbBtn.style.display = 'none';
  }
}

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}

// Handle Stripe redirect
(function() {
  var params = new URLSearchParams(window.location.search);
  var mapKey = params.get('map');
  var success = params.get('purchase');
  if (success === 'success' && mapKey && currentUser) {
    recordPurchase(currentUser.uid, mapKey).then(function() {
      activePurchases.push(mapKey);
      loadMap(currentMap);
      renderShop();
    });
    window.history.replaceState({}, '', window.location.pathname);
  }
})();

</script>
</body>
</html>
