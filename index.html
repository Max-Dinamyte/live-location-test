<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0e0d0b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Max Dinamyte"/>
<title>Max Dinamyte Travel Maps</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>

:root{
  --gold:#b8975a;--gold-lt:#d4b47a;--gold-dk:#8a6e3c;
  --ivory:#f2ece0;--ink:#0e0d0b;--smoke:#2e2b25;--charcoal:#1c1a16;
  --border:rgba(184,151,90,0.22);
  --font-serif:'Cormorant',Georgia,serif;--font-sans:'Jost',system-ui,sans-serif;
  --restaurant:#e05a2b;--bar:#6a3fd4;--site:#1a8c5e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font-sans);background:var(--ink);color:var(--ivory);display:flex;flex-direction:column;}

.auth-screen{position:fixed;inset:0;z-index:2000;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.auth-screen.hidden{display:none;}
.auth-logo{font-family:var(--font-serif);font-size:2rem;font-weight:600;letter-spacing:.15em;margin-bottom:.4rem;}
.auth-logo span{color:var(--gold);}
.auth-tagline{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(242,236,224,.35);margin-bottom:3rem;}
.auth-card{width:100%;max-width:360px;background:var(--smoke);border:1px solid var(--border);padding:2rem;}
.auth-card h2{font-family:var(--font-serif);font-weight:300;font-size:1.4rem;margin-bottom:1.5rem;text-align:center;}
.auth-input{width:100%;background:var(--charcoal);border:1px solid var(--border);color:var(--ivory);font-family:var(--font-sans);font-size:1rem;padding:.85rem 1rem;margin-bottom:1rem;outline:none;}
.auth-input::placeholder{color:rgba(242,236,224,.3);}
.auth-input:focus{border-color:var(--gold);}
.auth-btn{width:100%;padding:.95rem;background:var(--gold);color:var(--ink);font-family:var(--font-sans);font-size:.7rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;border:none;cursor:pointer;margin-bottom:.75rem;transition:background .2s;}
.auth-btn:hover{background:var(--gold-lt);}
.auth-btn.secondary{background:transparent;border:1px solid var(--border);color:var(--ivory);}
.auth-btn.secondary:hover{border-color:var(--gold);color:var(--gold);}
.auth-divider{text-align:center;font-size:.65rem;color:rgba(242,236,224,.3);letter-spacing:.1em;margin:.5rem 0;}
.auth-switch{text-align:center;font-size:.72rem;color:rgba(242,236,224,.4);margin-top:1rem;}
.auth-switch a{color:var(--gold);text-decoration:none;cursor:pointer;}
.auth-error{font-size:.7rem;color:#e05a2b;margin-bottom:.75rem;text-align:center;min-height:1rem;}

.topbar{background:var(--ink);border-bottom:1px solid var(--border);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:1000;}
.topbar-logo{font-family:var(--font-serif);font-size:1.1rem;font-weight:600;letter-spacing:.12em;color:var(--ivory);}
.topbar-logo span{color:var(--gold);}
.topbar-right{display:flex;align-items:center;gap:.75rem;}
.user-btn{background:none;border:1px solid var(--border);color:rgba(242,236,224,.5);font-family:var(--font-sans);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:.4rem .75rem;cursor:pointer;transition:.2s;}
.user-btn:hover{border-color:var(--gold);color:var(--gold);}

.tab-bar{background:var(--charcoal);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex:0 0 auto;padding:.65rem 1.1rem;font-family:var(--font-sans);font-size:.58rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(242,236,224,.35);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:.2s;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

.app-body{flex:1;display:flex;overflow:hidden;position:relative;}

.sidebar{width:300px;flex-shrink:0;background:var(--charcoal);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.filter-row{display:flex;gap:.35rem;flex-wrap:wrap;}
.filter-btn{background:none;border:1px solid var(--border);color:rgba(242,236,224,.4);font-family:var(--font-sans);font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .6rem;cursor:pointer;transition:.2s;}
.filter-btn.active,.filter-btn:hover{border-color:var(--gold);color:var(--gold);}
.places-list{flex:1;overflow-y:auto;padding:.5rem 0;}
.places-list::-webkit-scrollbar{width:4px;}
.places-list::-webkit-scrollbar-thumb{background:var(--gold-dk);border-radius:2px;}
.place-item{padding:.75rem 1rem;border-bottom:1px solid rgba(184,151,90,.08);cursor:pointer;transition:background .15s;display:flex;align-items:flex-start;gap:.6rem;}
.place-item:hover{background:rgba(184,151,90,.06);}
.place-item.locked{opacity:.45;cursor:default;}
.place-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.place-dot.restaurant{background:var(--restaurant);}
.place-dot.bar{background:var(--bar);}
.place-dot.site{background:var(--site);}
.place-name{font-size:.78rem;font-weight:500;color:var(--ivory);line-height:1.3;}
.place-lock{font-size:.65rem;color:rgba(242,236,224,.3);margin-top:.2rem;}

.map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}

.locate-btn{position:absolute;bottom:6rem;right:1rem;z-index:500;width:48px;height:48px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:.2s;}
.locate-btn:hover{background:var(--gold-lt);}
.locate-btn.active{background:var(--gold-lt);}
.locate-btn svg{width:22px;height:22px;fill:var(--ink);}
.pulse-ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--gold-lt);display:none;}
.locate-btn.active .pulse-ring{display:block;animation:pulse 1.8s ease-out infinite;}
@keyframes pulse{0%{transform:scale(.9);opacity:.8;}100%{transform:scale(1.6);opacity:0;}}

.place-popup{position:absolute;bottom:0;left:0;right:0;z-index:600;background:var(--smoke);border-top:1px solid var(--border);padding:1.25rem;transform:translateY(100%);transition:transform .3s ease;max-height:50vh;overflow-y:auto;}
.place-popup.open{transform:translateY(0);}
.popup-close{position:absolute;top:.75rem;right:.75rem;background:none;border:none;color:rgba(242,236,224,.4);font-size:1.1rem;cursor:pointer;}
.popup-type{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;}
.popup-name{font-family:var(--font-serif);font-size:1.3rem;font-weight:300;margin-bottom:.75rem;}
.popup-desc{font-size:.78rem;line-height:1.75;color:rgba(242,236,224,.65);}
.popup-directions{display:inline-block;margin-top:1rem;padding:.6rem 1.1rem;background:none;border:1px solid var(--gold);color:var(--gold);font-family:var(--font-sans);font-size:.62rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:.2s;}
.popup-directions:hover{background:var(--gold);color:var(--ink);}

.shop-screen{position:fixed;inset:0;z-index:1500;background:var(--ink);display:none;flex-direction:column;overflow-y:auto;}
.shop-screen.open{display:flex;}
.shop-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;background:var(--ink);z-index:10;}
.shop-header h2{font-family:var(--font-serif);font-weight:300;font-size:1.4rem;}
.shop-close{background:none;border:none;color:rgba(242,236,224,.4);font-size:1.5rem;cursor:pointer;}
.shop-grid{padding:1.25rem;display:flex;flex-direction:column;gap:1rem;}
.map-card{background:var(--smoke);border:1px solid var(--border);padding:1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.map-card-name{font-family:var(--font-serif);font-size:1.1rem;font-weight:300;margin-bottom:.4rem;}
.map-card-meta{font-size:.65rem;color:rgba(242,236,224,.4);line-height:1.6;}
.map-card-price{font-family:var(--font-serif);font-size:1.3rem;color:var(--gold);margin-bottom:.5rem;}
.buy-btn{background:var(--gold);color:var(--ink);border:none;font-family:var(--font-sans);font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:.65rem 1.1rem;cursor:pointer;transition:background .2s;white-space:nowrap;}
.buy-btn:hover{background:var(--gold-lt);}
.buy-btn.owned{background:var(--smoke);border:1px solid var(--border);color:rgba(242,236,224,.5);cursor:default;}

.sidebar-toggle{display:none;position:absolute;top:0;bottom:0;left:0;z-index:400;width:28px;background:var(--smoke);border-right:1px solid var(--border);color:var(--gold);font-family:var(--font-sans);font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);align-items:center;justify-content:center;border:none;}

.map-legend{position:absolute;top:1rem;right:1rem;z-index:400;background:rgba(14,13,11,.88);border:1px solid var(--border);padding:.6rem .85rem;backdrop-filter:blur(8px);}
.legend-item{display:flex;align-items:center;gap:.5rem;font-size:.62rem;color:rgba(242,236,224,.5);margin-bottom:.3rem;}
.legend-item:last-child{margin-bottom:0;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.unlock-banner{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);z-index:500;background:rgba(14,13,11,.9);border:1px solid var(--border);padding:.7rem 1.25rem;display:flex;align-items:center;gap:1rem;backdrop-filter:blur(8px);white-space:nowrap;}
.unlock-banner span{font-size:.68rem;color:rgba(242,236,224,.6);}
.unlock-banner button{background:var(--gold);color:var(--ink);border:none;font-family:var(--font-sans);font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:.5rem .9rem;cursor:pointer;}

.mobile-unlock{display:none;position:fixed;bottom:5rem;right:1rem;z-index:500;background:var(--gold);color:var(--ink);font-family:var(--font-sans);font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:.85rem 1.4rem;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);border-radius:2px;}

.leaflet-control-zoom{border:1px solid var(--border)!important;}
.leaflet-control-zoom a{background:var(--smoke)!important;color:var(--ivory)!important;border-bottom:1px solid var(--border)!important;}
.leaflet-control-zoom a:hover{background:var(--charcoal)!important;}
.leaflet-control-attribution{background:rgba(14,13,11,.7)!important;color:rgba(242,236,224,.3)!important;font-size:.58rem!important;}
.live-dot{width:16px;height:16px;border-radius:50%;background:var(--gold);border:3px solid var(--ivory);box-shadow:0 0 0 4px rgba(184,151,90,.3),0 2px 8px rgba(0,0,0,.5);}

@media(max-width:768px){
  .sidebar{position:absolute;left:-300px;top:0;bottom:0;z-index:300;}
  .sidebar.open{left:28px;}
  .sidebar-toggle{display:flex;}
  #map{position:absolute;top:0;left:28px;right:0;bottom:0;}
  .locate-btn{bottom:8rem;}
  .mobile-unlock{display:block;}
  .unlock-banner{display:none!important;}
}

</style>
</head>
<body>
<div class="auth-screen" id="authScreen">
  <div class="auth-logo">Max <span>Dinamyte</span></div>
  <div class="auth-tagline">Independent Travel Maps</div>
  <div class="auth-card">
    <h2 id="authTitle">Sign In</h2>
    <div class="auth-error" id="authError"></div>
    <input class="auth-input" type="email" id="authEmail" placeholder="Email address" autocomplete="email"/>
    <input class="auth-input" type="password" id="authPassword" placeholder="Password" autocomplete="current-password"/>
    <button class="auth-btn" id="authSubmitBtn" onclick="submitAuth()">Sign In</button>
    <div class="auth-divider">or</div>
    <button class="auth-btn secondary" onclick="signInGoogle()">Continue with Google</button>
    <div class="auth-switch" id="authSwitch">No account? <a onclick="toggleAuthMode()">Create one</a></div>
  </div>
</div>
<div id="mainApp" style="display:none;flex-direction:column;height:100%;">
  <div class="topbar">
    <div class="topbar-logo">Max <span>Dinamyte</span></div>
    <div class="topbar-right">
      <button class="user-btn" onclick="openShop()">My Maps</button>
      <button class="user-btn" onclick="doSignOut()">Sign Out</button>
    </div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div class="app-body">
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">Places</button>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="filter-row">
          <button class="filter-btn active f-all" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('restaurant',this)">Restaurants</button>
          <button class="filter-btn" onclick="setFilter('bar',this)">Bars</button>
          <button class="filter-btn" onclick="setFilter('site',this)">Sites</button>
        </div>
      </div>
      <div class="places-list" id="placesList"></div>
      <button id="sidebarUnlockBtn" onclick="openShop()" style="display:none;width:100%;background:var(--gold);color:var(--ink);font-family:var(--font-sans);font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:1rem;border:none;cursor:pointer;flex-shrink:0;">Unlock Full Map — $2.99</button>
    </div>
    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-legend" id="mapLegend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--restaurant)"></div>Restaurant</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar)"></div>Bar</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--site)"></div>Site</div>
      </div>
      <button class="locate-btn" id="locateBtn" onclick="toggleLocation()">
        <div class="pulse-ring"></div>
        <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
      </button>
      <div class="unlock-banner" id="unlockBanner" style="display:none;">
        <span id="unlockText">Showing free preview</span>
        <button onclick="openShop()">Unlock — $2.99</button>
      </div>
      <div class="place-popup" id="placePopup">
        <button class="popup-close" onclick="closePopup()">x</button>
        <div class="popup-type" id="popupType"></div>
        <div class="popup-name" id="popupName"></div>
        <div class="popup-desc" id="popupDesc"></div>
        <a class="popup-directions" id="popupDirections" target="_blank">Open in Google Maps</a>
      </div>
    </div>
  </div>
</div>
<div class="shop-screen" id="shopScreen">
  <div class="shop-header"><h2>Available Maps</h2><button class="shop-close" onclick="closeShop()">x</button></div>
  <div class="shop-grid" id="shopGrid"></div>
</div>
<button class="mobile-unlock" id="mobileUnlock" onclick="openShop()">Unlock Full Map — $2.99</button>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

var firebaseConfig = {
  apiKey: "AIzaSyCophdRYppxncBYImw9OHA2TZ0fur0ZfTU",
  authDomain: "mdt-travel-app.firebaseapp.com",
  projectId: "mdt-travel-app",
  storageBucket: "mdt-travel-app.firebasestorage.app",
  messagingSenderId: "24864988014",
  appId: "1:24864988014:web:8875b4fba27985f46b7f7f",
  measurementId: "G-7Z847B8R0E"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

var MAPS = {
  buenosaires: {
    title:'Buenos Aires, Argentina', center:[-34.65,-57.9], zoom:9, total:64,
    stripeUrl:'https://buy.stripe.com/7sY9ATbBMchtfvK9dtenS0b',
    places:[
      {name:'Los Platitos',type:'restaurant',lat:-34.542796,lng:-58.436452,free:false,desc:'Famous restaurant for steaks and grilled hunks of cheese called provoleta. It\'s huge, seats about 500, and you can watch them grilling everything over charcoal at the bar.'},
      {name:'La Mezzetta',type:'restaurant',lat:-34.578157,lng:-58.460821,free:false,desc:'Go here for the cheese and onion fugazetta pizza. It\'s historic, and is one of the best pizzerias in Buenos Aires.'},
      {name:'Salvaje Bakery',type:'restaurant',lat:-34.580753,lng:-58.441994,free:false,desc:'Breakfast pastries. This bakery is known for its medialunas, which are a sweet croissant. It is small, so you might have to wait.'},
      {name:'Heladería Pistacchio',type:'restaurant',lat:-34.582314,lng:-58.447371,free:false,desc:'One of the most popular ice cream shops in the city. If they\'re serving pistachio, it\'s worth a try, but, honestly, it\'s all pretty delicious.'},
      {name:'El Santa Evita',type:'restaurant',lat:-34.593151,lng:-58.4245,free:false,desc:'This is a restaurant dedicated to Evita. It\'s Argentine comfort food with a side of political arguing. They\'ve also been known to do an aperitivo starting at 6pm.'},
      {name:'Don Ignacio',type:'restaurant',lat:-34.610657,lng:-58.415063,free:false,desc:'Off the beaten track. This is a neighborhood dive known for milanesa. Cheap, Argentine comfort food.'},
      {name:'Nuestra Parrilla',type:'restaurant',lat:-34.619069,lng:-58.372861,free:false,desc:'This is the place for a choripan, which is a chorizo sausage that has been butterflied and served in a bun. It\'s very traditional Porteno.'},
      {name:'Patio de los lecheros',type:'restaurant',lat:-34.623482,lng:-58.454548,free:false,desc:'This is an open market filled with food trucks and other street food.'},
      {name:'Don Carlos',type:'restaurant',lat:-34.636103,lng:-58.363669,free:false,desc:'Meat and pasta, but you don\'t get to choose. The owner decides what you\'re going to eat that night and his wife and granddaughter make it.'},
      {name:'Feria de Mataderos',type:'restaurant',lat:-34.66271,lng:-58.500256,free:false,desc:'Sunday outdoor market that is usually filled with locals. Empanadas, torta frita (fried dough), tamales, locro (hominy stew), and humitas (steamed creamed corn).'},
      {name:'Don Julio Parrilla',type:'restaurant',lat:-34.586316,lng:-58.424269,free:true,desc:'If this is NOT the best steakhouse in the world, it\'s in the conversation. Make sure to get reservations, because getting in otherwise is almost impossible.'},
      {name:'Cabaña Las Lilas',type:'restaurant',lat:-34.604009,lng:-58.366736,free:false,desc:'A parrilla that has it\'s own cattle ranch. The meat is good, as is the atmosphere.'},
      {name:'La Cabrera',type:'restaurant',lat:-34.589385,lng:-58.432785,free:false,desc:'Considered by locals to be one of the best parrillas in the city, and locals know their meat.'},
      {name:'Pizzería Güerrin',type:'restaurant',lat:-34.604121,lng:-58.385982,free:false,desc:'Argentine pizza is different from other pizza. It\'s hard to describe, but it is delicious. This is one of the most renowned pizzerias in Buenos Aires. They are also known for fantastic empanadas.'},
      {name:'Ña Serapia',type:'restaurant',lat:-34.582851,lng:-58.407708,free:false,desc:'Typical bodegón with particularly flaky empanadas. Try the ‘La Porteña’ with raisins and olives, and the ‘Salteña’ style empanada.'},
      {name:'Parrilla El Pobre Luis',type:'restaurant',lat:-34.555342,lng:-58.452246,free:false,desc:'A parrilla run by a Uruguayan family. It\'s frequented by locals. You have to try the mollejas (sweetbread), pamplonas, liver and kidney a la tela.'},
      {name:'El Cuartito',type:'restaurant',lat:-34.597843,lng:-58.3855,free:false,desc:'Founded in 1934, this is one of the oldest pizzerias in Buenos Aires. It has been declared an Argentine heritage site. Also try the empanadas.'},
      {name:'Los Galgos',type:'restaurant',lat:-34.603012,lng:-58.392309,free:false,desc:'One of the cafe notables (historic cafes) that actually serves good coffee. Go for breakfast, and get the cortado and ham and cheese tostado.'},
      {name:'Bar Plaza Dorrego',type:'restaurant',lat:-34.620571,lng:-58.371309,free:false,desc:'A coffee bar in the San Telmo Market. And while you can find it many places around the city now, they are know for the "submarino." It\'s a hot mug of milk in which you melt an entire chocolate bar.'},
      {name:'Las Violetas',type:'restaurant',lat:-34.611148,lng:-58.420788,free:false,desc:'A traditional cafe well know for it\'s high tea.'},
      {name:'Mercado San Telmo',type:'restaurant',lat:-34.6195,lng:-58.372821,free:false,desc:'This is the main indoor market in Buenos Aires. Food, antiques, crafts, coffee, etc. Go to Beba Cocina restaurant inside the market and get Palmeritas de Roquefort y Ananá (palmiers with Roquefort, pickled pineapple, and basil; it might be the best food you never knew existed).'},
      {name:'Café de los Angelitos',type:'restaurant',lat:-34.609628,lng:-58.396133,free:false,desc:'One of the old traditional cafes in Buenos Aires. Beautiful tile work and stained glass. Try the torta de ricota.'},
      {name:'Café Tortoni',type:'restaurant',lat:-34.608653,lng:-58.378212,free:true,desc:'The coffee mecca in Buenos Aires. It has been the center of intellectual Buenos Aires for nearly 200 years.'},
      {name:'Nilson',type:'bar',lat:-34.619522,lng:-58.3724,free:false,desc:'This is one of the best wine bars in Buenos Aires. If you want a good bottle of Argentine wine, come here. You can get wine and wander around the market.'},
      {name:'La Fuerza',type:'bar',lat:-34.585585,lng:-58.44494,free:false,desc:'A vermouth bar that makes its own red and white from local ingredients and serves it on tap. The drinks are good, and food, mostly snacks pairs nicely with the vermouth, or a cocktail.'},
      {name:'Floreria Atlántico',type:'bar',lat:-34.591532,lng:-58.379713,free:false,desc:'This is an up-scale cocktail bar behind a florist shop. The housemade gin is made with yerba mate.'},
      {name:'Doppelganger Bar',type:'bar',lat:-34.624436,lng:-58.372611,free:false,desc:'Retro bar with classic cocktails. It has the feel of an old social club.'},
      {name:'Café San Bernardo',type:'bar',lat:-34.597867,lng:-58.441156,free:false,desc:'Neighborhood dive by day, bustling table tennis bar by night.'},
      {name:'Sky Bar',type:'bar',lat:-34.597473,lng:-58.376804,free:false,desc:'One of the few rooftop bars with views. Buenos Aires is not stunning from the air, so, this is on the list, but not a must do.'},
      {name:'Guebara Bar',type:'bar',lat:-34.620656,lng:-58.37232,free:false,desc:'Local dive bar. It\'s beer in pitchers, cheap drinks, no live music.'},
      {name:'Sónoman',type:'bar',lat:-34.584558,lng:-58.436644,free:false,desc:'A local bar that is has its share of non-locals. It has good, cheap cocktails. Head to the garden in the back.'},
      {name:'Palacio Barolo',type:'bar',lat:-34.609591,lng:-58.385843,free:true,desc:'This is an old building inspired by Dante\'s "Divine Comedy." There is a rooftop bar called Salon 1923, and if you can be there at sunset you get a great view of the sun setting behind the Congress building.'},
      {name:'La Casa del Señor Duncan',type:'bar',lat:-34.611333,lng:-58.420084,free:false,desc:'A bar in an old mansion. You have to ring the bell to get in. Expect singing, dancing, piano playing, and everything in between.'},
      {name:'Lo de Roberto',type:'bar',lat:-34.579253,lng:-58.541219,free:false,desc:'This is a tango bar that feels like stepping back in time. The owner is an old man who will occasionally get up and start singing.'},
      {name:'Liverpool',type:'bar',lat:-34.584001,lng:-58.444068,free:false,desc:'This is a bar dedicated to British music. There are theme nights, including Oasis nights.'},
      {name:'Ferona',type:'bar',lat:-34.587034,lng:-58.437628,free:false,desc:'This is a dimly lit social club. Ring the bell and they\'ll let you in. There is also a rooftop terrace that is nice. It can get busy late at night.'},
      {name:'El Zanjon de Granados',type:'site',lat:-34.616722,lng:-58.371808,free:false,desc:'This is a series of tunnels under the city that many believe to be the original settlement of Buenos Aires. Make sure to book a tour before you go.'},
      {name:'Casa Rosada',type:'site',lat:-34.608056,lng:-58.370278,free:true,desc:'The Presidential palace. You can do tours, this is where Madonna...er...Evita sang to the public (although that didn\'t happen).'},
      {name:'Recoleta Cemetery',type:'site',lat:-34.587483,lng:-58.393441,free:true,desc:'Famous cemetery with ostentatious mausoleums. It is truly one of the most beautiful cemeteries in the world. Eva Peron is here in the Duarte crypt, and many other well known Argentines are also buried here.'},
      {name:'Teatro Colón',type:'site',lat:-34.601041,lng:-58.383079,free:false,desc:'If you like opera or Belle Epoque architecture this is the place to go. An awe-inspiring building, for sure.'},
      {name:'Plaza de Mayo',type:'site',lat:-34.608367,lng:-58.372283,free:false,desc:'This is the center of Buenos Aires. Come here to people watch and drink mate, but bring your own mate.'},
      {name:'Argentine Polo Association',type:'site',lat:-34.570501,lng:-58.428047,free:false,desc:'Argentina is to polo what New York is to baseball and Manchester/Rio is to soccer (futbol). If you want a unique experience, seeing polo in Argentina is up there.'},
      {name:'Obelisco',type:'site',lat:-34.603739,lng:-58.38157,free:false,desc:'221 foot obelisk built to commemorate the 400th Anniversary of Buenos Aires\' founding. It\'s a national historic monument.'},
      {name:'Congreso de la Nación Argentina',type:'site',lat:-34.609821,lng:-58.392606,free:false,desc:'This is the Argentine legislative building. It is a stunning building, absolutely stunning. There are free guided tours at 12:30pm on Monday, Tuesday, Thursday, and Friday.'},
      {name:'Avenida de Mayo',type:'site',lat:-34.609092,lng:-58.381134,free:false,desc:'The street connecting the Casa Rosada and the Parliament. This is the most important political street in Argentina.'},
      {name:'Tigre',type:'site',lat:-34.425087,lng:-58.579658,free:false,desc:'This is a city about 30ks north of Buenos Aires. It is in the Parana Delta. It\'s quite scenic with lots to do. Check out the Puerto de Frutos, the Museo del Mate, take a boat ride around the delta, or check out the art museum, if nothing else, for the building.'},
      {name:'Feria de San Telmo',type:'site',lat:-34.609146,lng:-58.371897,free:false,desc:'This is a street market that is well known for antiques. Only on Sundays.'},
      {name:'Feria de Caminito',type:'site',lat:-34.63934,lng:-58.362684,free:false,desc:'The center of La Boca, the most bohemian part of the city. There is a "museum" here that has been around since 1959. It\'s a pedestrian zone that is also an art market.'},
      {name:'Feria de libros Parque Rivadavia ( compra venta canje )',type:'site',lat:-34.618512,lng:-58.434869,free:false,desc:'A market for all sorts of published materials, books, magazines, newspapers, etc.'},
      {name:'El Ateneo Grand Splendid',type:'site',lat:-34.595983,lng:-58.394228,free:false,desc:'This is the most beautiful book store in the world according to National Geographic, and the second most beautiful according to the Guardian. It\'s in an old theater, and you can still sit in the box seats and read.'},
      {name:'Buenos Aires Metropolitan Cathedral',type:'site',lat:-34.607569,lng:-58.373257,free:false,desc:'This looks like the Roman pantheon. They also do a changing of the guard every 2 hours starting at 7am.'},
      {name:'Milonga Malena Sunderland Club',type:'site',lat:-34.564872,lng:-58.484994,free:false,desc:'This is a traditional milonga. Go on a Saturday about 10pm, have dinner, and then dance. It\'s a family affair.'},
      {name:'Confiteria Ideal',type:'site',lat:-34.60347,lng:-58.379372,free:false,desc:'This place has a matinee milonga, if you don\'t want to stay up until 1am. The building is also gorgeous.'},
      {name:'Salon Caning (Milonga Parakultural)',type:'site',lat:-34.592772,lng:-58.427522,free:false,desc:'This is one of the leading milongas in Buenos Aires. It is usually packed, but has different levels of tangoers. Rumor is that you should go Monday, Tuesday, or Friday.'},
      {name:'La Catedral del Tango',type:'site',lat:-34.60491,lng:-58.421549,free:false,desc:'This is place has classes everyday at 6pm. You can stick around and dance afterwards. This is the best place to not be intimidated. It\'s also quite laid back.'},
      {name:'Plaza Independencia',type:'site',lat:-34.907017,lng:-56.199716,free:false,desc:'This is the center of the city. Check out the Puerta de la Ciudadela.'},
      {name:'Fortress General Artigas',type:'site',lat:-34.888457,lng:-56.260023,free:false,desc:'Come here for impressive views of the city.'},
      {name:'Palacio Legislativo',type:'site',lat:-34.891252,lng:-56.187222,free:false,desc:'This is the parliament building and is architecturally very interesting. It has 27 different colors of marble all from Uruguay. You can get guided tours in English at 10:30am and 3pm.'},
      {name:'Punta Brava',type:'site',lat:-34.930848,lng:-56.159799,free:false,desc:'Come here for a sunset.'},
      {name:'Pittamiglio Castle',type:'site',lat:-34.920978,lng:-56.149828,free:false,desc:'This is an odd building sandwiched between modern buildings. Built by an alchemist, it\'s quite...eclectic. Tours at 5pm'},
      {name:'Rambla Mahatma Gandhi',type:'site',lat:-34.924312,lng:-56.154142,free:false,desc:'At 22kms the longest unbroken sidewalk in the world. The views ain\'t so bad either.'},
      {name:'Feria de Tristan Narvaja',type:'site',lat:-34.901721,lng:-56.177989,free:false,desc:'Sunday market for everything from cheese to antique books and household goods. Worth visitng.'},
      {name:'Mercado del Puerto',type:'restaurant',lat:-34.905705,lng:-56.211728,free:false,desc:'A market known for pasta and BBQ. Try a matambre.'},
      {name:'Bar Arocena',type:'restaurant',lat:-34.889852,lng:-56.056511,free:false,desc:'This is where the chivito sandwich was supposedly invented. Try the papas fritas as well.'},
    ]
  },
  rome: {
    title:'Rome, Italy', center:[41.897,12.476], zoom:13, total:48,
    stripeUrl:'https://buy.stripe.com/00w7sLbBM3KX97mexNenS03?success_url=https%3A%2F%2Fmaxdinamyte.com%2Frome-success.html%3Ftoken%3Dmdt2026rome',
    places:[
      {name:'Roscioli Salumeria con Cucina',type:'restaurant',lat:41.894256,lng:12.474242,free:true,desc:"If you're going to go to one restaurant in Rome, make it this one. Pasta, baked goods, meats, cheeses, wines, everything you need in Italy. Call to make sure you end up with a good table, but even if you end up in the basement, it's worth it."},
      {name:'Supplizio',type:'restaurant',lat:41.897487,lng:12.467911,free:true,desc:"Roman street food. It's fried, it's delicious. Try the suppli, which are like arancini, but Roman."},
      {name:'Trevi Fountain',type:'site',lat:41.900932,lng:12.483313,free:true,desc:"It's the Trevi Fountain. You've seen it in postcards. Get there super early to get a view without crowds, then find a place to get a caffe e cornetto."},
      {name:'Il Goccetto',type:'bar',lat:41.897794,lng:12.467311,free:true,desc:"This is a wine bar, with famously surly servers. The sign over it says \"Vino e Olio.\" There will be a crowd of locals outside, likely smoking. Push inside. There is a large wine list, and nice aperitivo type foods."},
      {name:'Colosseo',type:'site',lat:41.890569,lng:12.492299,free:true,desc:"It's the Colosseum."},
      {name:'Monte Testaccio',type:'restaurant',lat:41.875952,lng:12.475694,free:false,desc:'It\'s the Colosseum.'},
      {name:'Pasquino Bistrot',type:'restaurant',lat:41.898019,lng:12.47183,free:false,desc:'Classic Roman food in the center of the city. If you\'re near Piazza Navona and want to eat, go here. The food is good, which is strange for this part of Rome, and it\'s not outrageously expensive.'},
      {name:'Testaccio Market',type:'restaurant',lat:41.877685,lng:12.473844,free:false,desc:'This is the food market in the foodiest neighborhood in Rome. Try Mordi e Vai for sandwiches and Chicchi e Lettere for an aperitivo.'},
      {name:'Mordi e Vai',type:'restaurant',lat:41.877511,lng:12.473402,free:false,desc:'This is a sandwich shop that is fantastic. The allesso di bollito is considered iconic. Take the sandwich to the closed slaughterhouse for a great view.'},
      {name:'Ristorante la Campana',type:'restaurant',lat:41.902655,lng:12.474581,free:false,desc:'The oldest restaurant in Rome. It is known for classic Roman fare, and has been frequented by many luminaries. Just remember, this restaurant was serving food before Columbus sailed. If you\'re looking for something specific, get the artichokes.'},
      {name:'Giolitti',type:'restaurant',lat:41.901066,lng:12.477274,free:false,desc:'This is the oldest gelateria in Rome. There will be a massive line, but if you don\'t mind paying a little more, sit at a table. The dishes of ice cream are fantastic, and you get to take a load off your feet.'},
      {name:'La Matriciana dal 1870',type:'restaurant',lat:41.900191,lng:12.495838,free:false,desc:'One of the classic restaurants of Rome, known for bucatini all\'Amatriciana, which was, of course, invented here.'},
      {name:'Felice a Testaccio',type:'restaurant',lat:41.878554,lng:12.477454,free:false,desc:'This restaurant dates from the 1930s. It is named after the founder, a man named Felice, who was fabled for sending people away if he just didn\'t like the look of them. The cacio e pepe is famous. Call a week in advance for a reservation. It\'s hard to get into.'},
      {name:'Taverna Volpetti',type:'restaurant',lat:41.878952,lng:12.478396,free:false,desc:'This is a "deli" serving bread, cheese, charcuterie, etc. You know all the good things. They also make pizzas.'},
      {name:'Bar San Calisto',type:'restaurant',lat:41.889062,lng:12.470804,free:false,desc:'A fantastic maritozzo, which is a cream filled brioche. And it\'s in a quieter part of Rome.'},
      {name:'Piperno Restaurant',type:'restaurant',lat:41.892486,lng:12.475996,free:false,desc:'Dating back to 1860, this is a classic restaurant in the Jewish ghetto. The fried artichokes are a specialty as are the fried stuffed zucchini flowers.'},
      {name:'Nonna Betta',type:'restaurant',lat:41.892778,lng:12.478056,free:false,desc:'This is THE kosher restaurant in the Jewish Ghetto. There are two menus; one for meat and one for fish and cheese.'},
      {name:'Pizzeria Remo A Testaccio',type:'restaurant',lat:41.880904,lng:12.475466,free:false,desc:'This is a classic Roman pizzeria. Expect it to be cheap and good.'},
      {name:'Pasticceria Barberini',type:'restaurant',lat:41.878979,lng:12.478733,free:false,desc:'This is one of the best pastry shops in all of Rome. The specialty is a croissant with pistachio cream, and it is top notch. There is also gelato.'},
      {name:'Antico Forno Roscioli',type:'restaurant',lat:41.894567,lng:12.474278,free:false,desc:'This is an institution known for its pizza. The pizza bianca is particularly good. You can buy wine here and go and eat and drink in a park.'},
      {name:'Sora Lucia',type:'restaurant',lat:41.9024636,lng:12.4870148,free:false,desc:'This is a fantastic local restaurant. Given the area of Rome (not far from the Trevi Fountain) it\'s hard to find places that are not overpriced and bad. This is one of them. There will be a mix of tourists and local.'},
      {name:'Trattoria Settimio',type:'restaurant',lat:41.897295,lng:12.46865,free:false,desc:'This is a classic trattoria with a menu that changes every day. It\'s old-school comfort food.'},
      {name:'Pizzeria Dar Poeta',type:'restaurant',lat:41.891388,lng:12.468544,free:false,desc:'This is one of the most classic traditional Roman pizzerias. Popular with locals.'},
      {name:'Virginiae',type:'restaurant',lat:41.899075,lng:12.471044,free:false,desc:'Very good traditional Roman food, and not outrageously expensive.'},
      {name:'Modo Ristorante Caffè',type:'restaurant',lat:41.851973,lng:12.476788,free:false,desc:'This is fantastic traditional Roman food and tiki drinks. It\'s great for aperitivo, but a bit out of the way.'},
      {name:'Piccolo Buco',type:'restaurant',lat:41.9013,lng:12.484638,free:false,desc:'This is an artisanal pizzeria. It may well be the best in Rome. There will be a line that forms across the street going down the smaller Vicolo Scanderbeg, but it moves quickly. Try the culatello, rucola e pomodorini.'},
      {name:'Il Palazzetto',type:'bar',lat:41.9065,lng:12.482848,free:false,desc:'This is a rooftop wine bar with views of the Spanish Steps. You can access it at the top of the steps, although it is in the Hassler Hotel.'},
      {name:'The Court Rooftop Bar',type:'bar',lat:41.890157,lng:12.49556,free:false,desc:'So...just come here for the view of the Colosseum while drinking. Make sure you call ahead, it fills up.'},
      {name:'Eitch Borromini',type:'bar',lat:41.899106,lng:12.472358,free:false,desc:'Wow! The rooftop bar here "La Grande Bellazza" has a 360 degree view of Rome. Wow!'},
      {name:'Chicchi & Lettere',type:'bar',lat:41.87744,lng:12.473716,free:false,desc:'This is a good spot for an aperitivo before lunch at the market.'},
      {name:'Mecenate Palace Hotel',type:'bar',lat:41.896792,lng:12.499881,free:false,desc:'This is a rooftop bar with an incredible view of the Basilica of Santa Maria Maggiore, the resting place of Pope Francis. The prices are reasonable and no need to reserve. It opens at 5pm.'},
      {name:'9Hotel Cesàri & Terrazza',type:'bar',lat:41.899924,lng:12.479954,free:false,desc:'A chill rooftop bar that has a nice view, but is missed unless you know it\'s there.'},
      {name:'Hotel NH Collection Roma Fori Imperiali',type:'bar',lat:41.896154,lng:12.484907,free:false,desc:'This is a rooftop bar with a SPECTACULAR view of the Forum. Come here at sunset, you won\'t be disappointed.'},
      {name:'Spanish Steps',type:'site',lat:41.90599,lng:12.482775,free:false,desc:'These connect Piazza di Spagna at the base and Piazza Trinità dei Monti at the top. It\'s an iconic place. Sit on the steps, eat some pizza and drink some wine.'},
      {name:"Saint Peter's Square",type:'site',lat:41.902222,lng:12.456728,free:false,desc:'It\'s the Vatican, you have to (holy) see this place. Go into the basilica. Get tickets for the Museum, which is a different entrance. Make sure you get tickets to the Vatican Museum early in the day, and recognize that it\'s Italy, so opening and closing times are fluid.'},
      {name:'Sistine Chapel',type:'site',lat:41.902947,lng:12.454484,free:false,desc:'It\'s the Sistine Chapel. If you don\'t go, you haven\'t been to Rome. Early admission tickets to the Museum are worth getting. There isn\'t much other than the Chapel and the Raphael room in the Museum.'},
      {name:'Roman Forum',type:'site',lat:41.892462,lng:12.485325,free:false,desc:'It\'s the Roman Forum.'},
      {name:'Borghese Gallery and Museum',type:'site',lat:41.91421,lng:12.492144,free:false,desc:'This is a museum specializing in Renaissance art in an old villa. It is a gem of Rome that many tourists miss. You shouldn\'t. A tour guide is worth considering. The grounds are also gorgeous, but are separate from the museum.'},
      {name:"Castel Sant'Angelo",type:'site',lat:41.903063,lng:12.466276,free:false,desc:'Originally built as Hadrian\'s mausoleum, this fortress has been used as a citadel, prison, and safe location for popes. It connects to the Vatican underground. There is also a rooftop bar here with an amazing view (note it closes at 7:30pm).'},
      {name:'St. Angelo Bridge',type:'site',lat:41.901788,lng:12.466462,free:false,desc:'This is a pedestrian bridge over the Tiber. It is lined with angel statues sculpted by Bernini.'},
      {name:'Arch of Constantine',type:'site',lat:41.88977,lng:12.490602,free:false,desc:'This is an arch commemorating the Battle of Milvian Bridge. The arch probably isn\'t worth going to on its own, but since it is right next to the Colosseum, stop by and look at the carvings, which depict the history of Rome.'},
      {name:'Pantheon',type:'site',lat:41.898611,lng:12.476873,free:false,desc:'This is an old Roman temple built by Hadrian. It eventually became a Catholic Church. Today, it is considered one of the best preserved buildings from antiquity.'},
      {name:'Giardino degli Aranci',type:'site',lat:41.885058,lng:12.480346,free:false,desc:'This is on the highest hill in Rome (Aventine Hill), and has the best view of the city. Come here at sunset, but get there early as many people, even locals, like to come up here. The gardens were designed in 1932 by Raffaele de Vico. Keep in mind, if you\'re there in the summer the sun will set right next to the Vatican, if not it will be off to the side, but still beautiful.'},
      {name:'Punto Informativo Appia Antica',type:'site',lat:41.866882,lng:12.502987,free:false,desc:'This is a good spot to start a walk along the Appian Way. You can take it back into Rome. The 118 and 218 buses take you out there.'},
      {name:'Knights of Malta Keyhole',type:'site',lat:41.882981,lng:12.47847,free:false,desc:'This is a hole in the gardens that allows you to look through it to see St. Peter\'s. It\'s a great view, but all there really is to do at the Priory of the Knights of Malta. If you\'re in the area, like going to the Giardino degli Aranci, but don\'t make a trip here only for this.'},
      {name:'Domus Aurea',type:'site',lat:41.890622,lng:12.495612,free:false,desc:'This is a villa built by Nero after the fire, and was eventually used as the baths by Trajan. Worth checking out if you have the time.'},
      {name:'Mouth of Truth',type:'site',lat:41.888106,lng:12.48145,free:false,desc:'This is a marble sculpture that used to be a manhole in the 1st century. In the Middle Ages, the myth became that the sculpture will bite off the hand of a liar if placed in its mouth. There will be a line, and it\'s a bit chaotic.'},
      {name:'Quadraro',type:'site',lat:41.861878,lng:12.54924,free:false,desc:'This is an area of the city that has recently seen a Renaissance and is full of street art.'}
    ]
  }
